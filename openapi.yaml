          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      business_name:
                        type: string
                        description: Organization business name
                      business_phone_number:
