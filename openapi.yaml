      summary: Get campaign history
      description: |
        Returns the complete history log for a specific campaign.

        **Logged Actions Include:**
        - Step 1: Linked referral to campaign
        - Step 2: Selected PostGrid template
        - Step 3: Added offer details
        - Step 4: Added business details and images
        - Step 5: Linked location zone to campaign
        - Step 6: Completed campaign consents and disclaimers
        - Any manual updates via updateCampaignById

        History entries include user information (who performed the action) and timestamp.
      operationId: getCampaignHistory
      security:
        - SupabaseAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                  description: Campaign ID
            example:
              id: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        "200":
          description: Campaign history retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      campaign_id:
                        type: string
                        format: uuid
                      history:
                        type: array
                        items:
                          $ref: "#/components/schemas/CampaignHistoryEntry"
                      count:
                        type: integer
        "401":
          description: Unauthorized
        "403":
          description: User not in organization
        "404":
          description: Campaign not found
        "500":
          description: Internal server error

  /updateCampaignById:
    patch:
      tags:
        - Campaign Management
      summary: Update campaign by ID
      description: |
        Updates a campaign by ID. Can update any field except ID and organization_id.
        All changes are logged to campaign_history.

        **Updatable Fields:**
        - referral_id: Change linked referral
        - campaign_name: Update campaign name
        - status: Update campaign status
        - current_step: Update current step
        - front_template_id: Change PostGrid template for front of postcard
        - back_template_id: Change PostGrid template for back of postcard
        - zone_id: Change linked location zone
        - offer_data: Update offer details (merged with existing)
        - business_data: Update business details including optional merge_variable (JSON object) - merged with existing
        - additional_data: Update additional data (merged with existing)
        - postcards_sent: Update number of postcards sent
        - scan_rate: Update scan rate percentage
        - leads_gen: Update leads generated count
        - total_spent: Update total amount spent
        - roi: Update return on investment

        **Returns:** Updated campaign with image_url from referral gallery
      operationId: updateCampaignById
      security:
        - SupabaseAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                referral_id:
                  type: string
                  format: uuid
                campaign_name:
                  type: string
                  description: Campaign name
                status:
                  oneOf:
                    - type: string
                      enum: [Draft, Active, In Active]
                    - type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                current_step:
                  type: integer
                  minimum: 0
                  maximum: 6
                front_template_id:
                  type: string
                  description: PostGrid template ID for front of postcard
                back_template_id:
                  type: string
                  description: PostGrid template ID for back of postcard
                zone_id:
                  type: string
                  format: uuid
                  description: Location zone ID
                offer_data:
                  type: object
                business_data:
                  type: object
                additional_data:
                  type: object
                postcards_sent:
                  type: integer
                scan_rate:
                  type: number
                  format: decimal
                leads_gen:
                  type: integer
                total_spent:
                  type: number
                  format: decimal
                roi:
                  type: number
                  format: decimal
            examples:
              updateStatus:
                summary: Update campaign status
                value:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  status: "Active"
              updateBusinessData:
                summary: Update business data with merge variables
                value:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  business_data:
                    business_name: "Updated Business Name"
                    phone: "+1-555-999-8888"
                    merge_variable:
                      customer_name: "Jane Smith"
                      discount_code: "WINTER2025"
              updateMetrics:
                summary: Update campaign metrics
                value:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  postcards_sent: 500
                  scan_rate: 12.5
                  leads_gen: 62
                  total_spent: 750.00
                  roi: 250.00
      responses:
        "200":
          description: Campaign updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Campaign"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: User not in organization
        "404":
          description: Campaign not found
        "500":
          description: Internal server error

  /deleteCampaign:
    delete:
      tags:
        - Campaign Management
      summary: Delete campaign by ID
      description: |
        Deletes a campaign by ID. This action is irreversible.

        **Cascade Behavior:**
        - Automatically deletes all campaign_history entries (ON DELETE CASCADE)
        - Removes campaign_id from campaigns_used array in all templates belonging to the organization
        - Sets campaign_id to NULL in associated referrals (ON DELETE SET NULL)
        - Logs deletion action before removing the campaign

        **Security:**
        - Organization-based: Can only delete campaigns in user's organization
        - Requires authentication
      operationId: deleteCampaign
      security:
        - SupabaseAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                  description: Campaign ID to delete
            example:
              id: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        "200":
          description: Campaign deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Campaign deleted successfully
                  data:
                    type: object
                    properties:
                      deleted_campaign_id:
                        type: string
                        format: uuid
              example:
                status: success
                message: Campaign deleted successfully
                data:
                  deleted_campaign_id: "123e4567-e89b-12d3-a456-426614174000"
        "400":
          description: Invalid input (missing campaign ID)
        "401":
          description: Unauthorized
        "403":
          description: User not in organization
        "404":
          description: Campaign not found in user's organization
        "500":
          description: Internal server error

