      summary: Create a new template bundle (front + back)
      description: |
        Creates a pair of PostGrid templates (front and back) and links them as a bundle.

        **Business Rules:**
        - Requires PostGrid API key in request body
        - Creates two templates in PostGrid: one Front, one Back
        - Automatically appends " Front" and " Back" to the description
        - Saves both templates to templates table
        - Creates bundle record in template_bundles table
        - User must be authenticated and in organization
        - If isManualEdit is true, campaign_id is required

        **Features:**
        - Robust error handling with automatic cleanup
        - Transactional integrity (all-or-nothing template creation)
        - Organization-scoped bundles
        - History logging for both templates
        - Notifications for ADMIN users
      operationId: createNewTemplateBundle
      security:
        - BearerAuth: []
        - SupabaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - postgridApiKey
                - description
                - html_front
                - html_back
                - postcardSize
              properties:
                postgridApiKey:
                  type: string
                  description: PostGrid API key for template creation
                description:
                  type: string
                  description: Base description (will append " Front" and " Back")
                html_front:
                  type: string
                  description: HTML content for front template
                html_back:
                  type: string
                  description: HTML content for back template
                postcardSize:
                  type: string
                  enum: ["4x6", "6x9", "6x11"]
                  description: Postcard size for both templates
                isManualEdit:
                  type: boolean
                  default: false
                  description: Whether this is a manual edit template
                campaign_id:
