        - ✅ Discount applied as a line item on the invoice PDF
        - ✅ Stripe enforces redemption limits automatically
        - ✅ Supports custom amount, currency, and description
        - ✅ Organization-scoped
        - ✅ Supports test/production mode selection
        - ✅ Creates notification for ADMIN users

        **Business Rules:**
        - Only ADMIN users can charge payment methods
        - Payment method must belong to the organization's customer
        - Amount is in USD dollars (e.g., 50 = $50.00)
        - If `coupon_code` is provided, it must be an active Stripe Promotion Code string (e.g. "10OFF")
        - Stripe enforces coupon redemption limits — expired/exhausted codes are rejected
        - Generates notification: "A charge of ${amount} made against {last4} card"
        - **Address verification is free.** If the `description` contains "address" or
          "validation", the request is treated as an address-verification charge: Stripe is
          never called, no `payment_history` record is written, and the endpoint returns
          `200` with `payment.amount = 0` and `payment.id = null`. Only postcard-sending
          charges actually move money.

        **Receipt PDFs:**
        - All receipts are Stripe-hosted invoice PDFs (`receipt_url`)
        - Coupon receipts show: original amount, discount line, and final total
        - Use `validateCouponCode` to preview discount before charging

        **Authentication:** Required (JWT token)

        **Authorization:** ADMIN only
      operationId: chargePaymentMethod
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_method_id
                - amount
              properties:
                payment_method_id:
                  type: string
                  description: "Payment method ID from Stripe (pm_xxxxx)"
                  example: "pm_1234567890abcdefghijklmn"
                amount:
                  type: number
                  description: "Amount to charge in USD dollars (e.g. 50 = $50.00)"
                  minimum: 0.50
                  example: 50
                currency:
                  type: string
                  description: "Currency code (default: usd)"
                  example: "usd"
                  default: "usd"
                description:
                  type: string
                  description: |
                    Charge description (optional). If it contains "address" or "validation",
                    the charge is classified as address verification, which is free — no money
                    is charged and the endpoint returns 200 with amount 0 (see the 200 response).
                  example: "Campaign postcard printing"
                campaign_name:
                  type: string
                  description: "Campaign name for notification (optional)"
                  example: "Summer Sale 2024"
                coupon_code:
                  type: string
                  description: "Stripe Promotion Code string (optional). Must be active and within redemption limits."
                  example: "10OFF"
                campaign_id:
                  type: string
                  format: uuid
                  description: "Campaign ID (optional). If provided, saves a record to payment_history linked to this campaign."
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                isTestMode:
                  type: boolean
                  description: "If true, use Stripe test keys; if false or not provided, use production keys"
                  example: true
                  default: false
      responses:
        "200":
          description: |
            Address verification — no charge applied. Returned when the `description` indicates
            address verification (contains "address" or "validation"). Stripe is not called and
            no `payment_history` record is written.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Address verification is free — no charge applied"
                  payment:
                    type: object
                    properties:
                      id:
                        type: string
                        nullable: true
                        description: "Always null — no Stripe charge is created"
                        example: null
                      amount:
                        type: number
                        description: "Always 0 — address verification is not billed"
                        example: 0
                      currency:
                        type: string
                        example: "usd"
                      status:
                        type: string
                        example: "succeeded"
                      description:
                        type: string
                        example: "Address verification"
                      payment_type:
                        type: string
                        example: "address_verification"
        "201":
          description: Payment succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Payment succeeded"
                  payment:
                    type: object
                    properties:
                      id:
                        type: string
                        description: "Charge ID (ch_xxx) or Invoice ID (in_xxx) if auto-collected"
                        example: "ch_1234567890abcdefghijklmn"
                      amount:
                        type: number
                        description: "Final amount charged in USD dollars (after discount)"
                        example: 45
                      currency:
                        type: string
                        example: "usd"
                      amount_display:
                        $ref: "#/components/schemas/CurrencyEnrichment"
                      created_tz:
                        $ref: "#/components/schemas/TimezoneEnrichment"
                      status:
                        type: string
                        example: "succeeded"
                      description:
                        type: string
                        example: "Campaign postcard printing"
                      created:
                        type: string
                        format: date-time
                        example: "2025-02-11T10:30:00.000Z"
                      receipt_url:
                        type: string
                        format: uri
                        nullable: true
                        description: "Stripe-hosted invoice PDF URL showing full breakdown"
                        example: "https://pay.stripe.com/receipts/invoices/xxxxx"
                      original_amount:
                        type: number
                        nullable: true
                        description: "Pre-discount amount in cents (only present when coupon_code is used)"
                        example: 5000
                      discount_amount:
                        type: number
                        nullable: true
                        description: "Discount applied in cents (only present when coupon_code is used)"
                        example: 500
                      coupon_applied:
                        type: string
                        nullable: true
                        description: "Promotion Code string that was applied (only present when coupon_code is used)"
                        example: "10OFF"
                      discount_percent_off:
                        type: number
                        nullable: true
                        description: "Percentage discount (if coupon is percent-based)"
                        example: 10
                      discount_amount_off:
                        type: number
                        nullable: true
                        description: "Fixed discount amount in cents (if coupon is fixed-amount)"
                        example: null
                      payment_method:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "pm_1234567890abcdefghijklmn"
                          type:
                            type: string
                            example: "card"
                          card:
                            type: object
                            properties:
                              brand:
                                type: string
                                example: "visa"
                              last4:
                                type: string
                                example: "4242"
                              exp_month:
                                type: integer
                                example: 12
                              exp_year:
                                type: integer
                                example: 2026
                  processingTimeMs:
                    type: integer
                    example: 389
        "400":
          description: Invalid input or payment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidInput:
                  value:
                    error: "INVALID_INPUT"
                    message: "amount is required and must be a positive number (in USD)"
                invalidCoupon:
                  value:
                    error: "INVALID_COUPON"
                    message: "The coupon code is invalid, inactive, or has expired"
                couponExpired:
                  value:
                    error: "COUPON_EXPIRED"
                    message: "The coupon code has expired or reached its maximum redemption limit"
                invalidPaymentMethod:
                  value:
                    error: "INVALID_PAYMENT_METHOD"
                    message: "Payment method does not belong to this organization"
                cardError:
                  value:
                    error: "CARD_ERROR"
                    message: "Your card was declined"
                amountTooSmall:
                  value:
                    error: "AMOUNT_TOO_SMALL"
                    message: "The amount is too small. Minimum charge amount is 50 cents."
                paymentFailed:
                  value:
                    error: "PAYMENT_FAILED"
                    message: "Payment failed. Please try a different payment method."
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - not ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                notAdmin:
                  value:
                    error: "FORBIDDEN"
                    message: "Only ADMIN users can charge payment methods"
        "404":
          description: No Stripe customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                noCustomer:
                  value:
                    error: "NO_CUSTOMER"
                    message: "Organization does not have a Stripe customer. Please add a payment method first."
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /getBillingHistory:
    post:
      tags:
        - Billing
      summary: Get billing history for organization (ADMIN only)
      description: |
        Retrieves all charges and invoice transactions from Stripe for the organization with pagination support.
        Merges direct charges and invoice-based transactions (coupon charges) into a single sorted list.

        **Features:**
        - ✅ ADMIN only
        - ✅ Returns direct charges AND invoice-based coupon transactions
        - ✅ Supports pagination via request body
        - ✅ Shows amount, status, date, description, receipt URL, coupon applied
        - ✅ Returns empty array if no billing history yet
        - ✅ Organization-scoped
        - ✅ Supports test/production mode selection

        **Business Rules:**
        - Only ADMIN users can view billing history
        - Returns transactions in reverse chronological order (newest first)
        - Coupon transactions include `invoice_id` and `discount_applied` fields
        - `receipt_url` links to Stripe-hosted invoice PDF for all transactions
        - Supports pagination with limit and starting_after parameters

        **Pagination:**
        - Use `limit` to control number of results (default: 50, max: 100)
        - Use `starting_after` with last charge ID for next page
        - Check `has_more` to know if more results exist

        **Authentication:** Required (JWT token)

        **Authorization:** ADMIN only
      operationId: getBillingHistory
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                isTestMode:
                  type: boolean
                  description: "If true, use Stripe test keys; if false or not provided, use production keys"
                  example: true
                  default: false
                limit:
                  type: integer
                  description: "Number of transactions to return (default: 50, max: 100)"
                  minimum: 1
                  maximum: 100
                  default: 50
                  example: 20
                starting_after:
                  type: string
                  description: "Charge ID to start after (for pagination)"
                  example: "ch_1234567890abcdefghijklmn"
      responses:
        "200":
          description: Billing history retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: "Charge ID (ch_xxx) or Invoice ID (in_xxx)"
                          example: "ch_1234567890abcdefghijklmn"
                        amount:
                          type: number
                          description: "Final amount charged in USD dollars (after any discount)"
                          example: 45
                        currency:
                          type: string
                          example: "usd"
                        status:
                          type: string
                          enum: [succeeded, pending, failed]
                          example: "succeeded"
                        description:
                          type: string
                          example: "Campaign postcard printing"
                        created:
                          type: string
                          format: date-time
                          example: "2025-02-11T10:30:00.000Z"
                        created_tz:
                          $ref: "#/components/schemas/TimezoneEnrichment"
                        amount_display:
                          $ref: "#/components/schemas/CurrencyEnrichment"
                        receipt_url:
                          type: string
                          format: uri
                          nullable: true
                          description: "Stripe-hosted invoice PDF URL"
                          example: "https://pay.stripe.com/receipts/invoices/xxxxx"
                        payment_method:
                          type: object
                          nullable: true
                          properties:
                            brand:
                              type: string
                              example: "visa"
                            last4:
                              type: string
                              example: "4242"
                        refunded:
                          type: boolean
                          example: false
                        amount_refunded:
                          type: number
                          description: "Amount refunded in cents"
                          example: 0
                        invoice_id:
                          type: string
                          nullable: true
                          description: "Stripe Invoice ID — present for coupon-based charges"
                          example: "in_1234567890abcdefghijklmn"
                        discount_applied:
                          type: string
                          nullable: true
                          description: "Promotion Code string applied at charge time (e.g. '10OFF')"
                          example: "10OFF"
                  has_more:
                    type: boolean
                    description: "Whether more results exist"
                    example: true
                  processingTimeMs:
                    type: integer
                    example: 178
              examples:
                withHistory:
                  value:
                    status: "success"
                    transactions:
                      - id: "ch_1234567890abcdefghijklmn"
                        amount: 45
                        currency: "usd"
                        status: "succeeded"
                        description: "Campaign postcard printing"
                        created: "2025-02-11T10:30:00.000Z"
                        receipt_url: "https://pay.stripe.com/receipts/invoices/xxxxx"
                        payment_method:
                          brand: "visa"
                          last4: "4242"
                        refunded: false
                        amount_refunded: 0
                        invoice_id: "in_1234567890abcdefghijklmn"
                        discount_applied: "10OFF"
                      - id: "ch_abcdefghijklmn1234567890"
                        amount: 50
                        currency: "usd"
                        status: "succeeded"
                        description: "Test charge for campaign"
                        created: "2025-02-10T08:00:00.000Z"
                        receipt_url: "https://pay.stripe.com/receipts/invoices/yyyyy"
                        payment_method:
                          brand: "visa"
                          last4: "4242"
                        refunded: false
                        amount_refunded: 0
                        invoice_id: null
                        discount_applied: null
                    has_more: true
                    processingTimeMs: 178
                noHistory:
                  value:
                    status: "success"
                    transactions: []
                    has_more: false
                    processingTimeMs: 45
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - not ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                notAdmin:
                  value:
                    error: "FORBIDDEN"
                    message: "Only ADMIN users can view billing history"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /validateCouponCode:
    post:
      tags:
        - Billing
      summary: Validate a coupon code and preview discount (ADMIN only)
      description: |
        Validates a Stripe Promotion Code and returns discount details without charging anything.
        Use this before `chargePaymentMethod` to show the user what discount they will receive.

        **Features:**
        - ✅ ADMIN only
        - ✅ Validates promotion code against Stripe (active, not expired, within limits)
        - ✅ Returns human-readable discount label ("10% OFF" or "$5.00 discount")
        - ✅ Returns original and discounted amounts
        - ✅ Does NOT create any charge or invoice

        **Business Rules:**
        - Only ADMIN users can validate coupon codes
        - Coupon must be active and within its redemption limit
        - `amount` is in USD dollars (e.g. 100 = $100.00)

        **Authentication:** Required (JWT token)

        **Authorization:** ADMIN only
      operationId: validateCouponCode
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - coupon_code
                - amount
              properties:
                coupon_code:
                  type: string
                  description: "Stripe Promotion Code string (user-facing, e.g. '10OFF')"
                  example: "10OFF"
                amount:
                  type: number
                  description: "Original charge amount in USD dollars (e.g. 100 = $100.00)"
                  minimum: 0.01
                  example: 100
                isTestMode:
                  type: boolean
                  description: "If true, use Stripe test keys; if false or not provided, use production keys"
                  example: true
                  default: false
      responses:
        "200":
          description: Coupon code is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Coupon code is valid"
                  discount:
                    type: string
                    description: "Human-readable discount label"
                    example: "10% OFF"
                  initial_amount:
                    type: number
                    description: "Original amount in USD dollars"
                    example: 100
                  discounted_amount:
                    type: number
                    description: "Final amount after discount in USD dollars"
                    example: 90
              examples:
                percentOff:
                  value:
                    status: "success"
                    message: "Coupon code is valid"
                    discount: "10% OFF"
                    initial_amount: 100
                    discounted_amount: 90
                fixedOff:
                  value:
                    status: "success"
                    message: "Coupon code is valid"
                    discount: "$5.00 discount"
                    initial_amount: 100
                    discounted_amount: 95
        "400":
          description: Invalid or expired coupon code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidCoupon:
                  value:
                    error: "INVALID_COUPON"
                    message: "The coupon code is invalid, inactive, or has expired"
                couponExpired:
                  value:
                    error: "COUPON_EXPIRED"
                    message: "The coupon code has expired or reached its maximum redemption limit"
                invalidInput:
                  value:
                    error: "INVALID_INPUT"
                    message: "coupon_code is required and must be a string"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - not ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                notAdmin:
                  value:
                    error: "FORBIDDEN"
                    message: "Only ADMIN users can validate coupon codes"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /getPaymentHistoryForCampaign:
    post:
      tags:
        - Billing
      summary: Get payment history for a campaign (ADMIN only)
      description: |
        Returns all payment records saved to `payment_history` for a specific campaign.
        Records are only created when `campaign_id` is passed to `chargePaymentMethod`.

        **Features:**
        - ✅ ADMIN only
        - ✅ Returns payments linked to a specific campaign
        - ✅ Validates campaign belongs to the user's organization
        - ✅ Results sorted newest first
        - ✅ Enriched amount and timezone fields

        **Business Rules:**
        - Only ADMIN users can view payment history
        - Campaign must belong to the user's organization
        - Returns empty array if no payments have been recorded for the campaign

        **Authentication:** Required (JWT token)

        **Authorization:** ADMIN only
      operationId: getPaymentHistoryForCampaign
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - campaign_id
              properties:
                campaign_id:
                  type: string
                  format: uuid
                  description: "Campaign ID to fetch payment history for"
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "200":
          description: Payment history retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  campaign_id:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  total:
                    type: integer
                    description: "Total number of payment records"
                    example: 3
                  payments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: "Payment history record ID"
                          example: "f1e2d3c4-b5a6-7890-abcd-ef1234567890"
                        campaign_id:
                          type: string
                          format: uuid
                          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        amount_paid:
                          type: number
                          description: "Final amount charged in USD dollars (after any discount)"
                          example: 45.00
                        amount_display:
                          $ref: "#/components/schemas/CurrencyEnrichment"
                        currency:
                          type: string
                          example: "usd"
                        stripe_charge_id:
                          type: string
                          nullable: true
                          description: "Stripe Charge ID (ch_xxx)"
                          example: "ch_1234567890abcdefghijklmn"
                        stripe_invoice_id:
                          type: string
                          nullable: true
                          description: "Stripe Invoice ID (in_xxx)"
                          example: "in_1234567890abcdefghijklmn"
                        coupon_applied:
                          type: string
                          nullable: true
                          description: "Promotion Code string used at charge time, if any"
                          example: "10OFF"
                        created_at:
                          type: string
                          format: date-time
                          example: "2026-04-01T09:30:00.000Z"
                        created_tz:
                          $ref: "#/components/schemas/TimezoneEnrichment"
              examples:
                withPayments:
                  value:
                    status: "success"
                    campaign_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    total: 2
                    payments:
                      - id: "f1e2d3c4-b5a6-7890-abcd-ef1234567890"
                        campaign_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        amount_paid: 45.00
                        currency: "usd"
                        stripe_charge_id: "ch_1234567890abcdefghijklmn"
                        stripe_invoice_id: "in_1234567890abcdefghijklmn"
                        coupon_applied: "10OFF"
                        created_at: "2026-04-01T09:30:00.000Z"
                      - id: "a2b3c4d5-e6f7-8901-bcde-f12345678901"
                        campaign_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        amount_paid: 50.00
                        currency: "usd"
                        stripe_charge_id: "ch_abcdefghijklmn1234567890"
                        stripe_invoice_id: "in_abcdefghijklmn1234567890"
                        coupon_applied: null
                        created_at: "2026-03-28T14:00:00.000Z"
                    has_more: false
                noPayments:
                  value:
                    status: "success"
                    campaign_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    total: 0
                    payments: []
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidInput:
                  value:
                    error: "INVALID_INPUT"
                    message: "campaign_id is required and must be a string"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - not ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                notAdmin:
                  value:
                    error: "FORBIDDEN"
                    message: "Only ADMIN users can view payment history"
        "404":
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                notFound:
                  value:
                    error: "NOT_FOUND"
                    message: "Campaign not found or does not belong to your organization"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /getAllTimeZones:
