  /getAllAddresses:
    get:
      tags:
        - Address Management
      summary: Get all addresses from organization zones
      description: |
        Retrieves all addresses from all location zones in the user's organization with optional filtering.

        **Business Rules:**
        - Returns addresses from all zones in the organization
        - **NEVER returns "Unverified" addresses** - they are always excluded
        - Optional filtering to show only exclusion addresses (Duplicate and Opt-out)
        - Automatic deduplication based on lat/lng coordinates
        - Includes zone metadata for each address
        - **Zone Filtering:**
          - Default (no `showAll` parameter): Returns addresses only from zones with `campaign_id` (linked to campaigns)
          - `showAll=true`: Returns addresses from all zones including those without `campaign_id`

        **Request Methods:**
        - GET: Returns Valid, Duplicate, and Opt-out addresses (excludes Unverified)
        - POST: Supports filtering with request body

        **Filtering Logic:**
        - showOnlyExclusions = false (default): Returns Valid, Duplicate, and Opt-out addresses (excludes Unverified)
        - showOnlyExclusions = true: Returns only Duplicate and Opt-out addresses (excludes Valid and Unverified)
      operationId: getAllAddressesGet
      security:
        - BearerAuth: []
      parameters:
        - name: showAll
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Set to "true" to retrieve addresses from all zones. Omit or set to "false" to retrieve only addresses from zones linked to campaigns (campaign_id is not null).
          example: "true"
      responses:
        "200":
          description: Addresses retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Found 150 unique addresses from 3 zones"
                  metadata:
                    type: object
                    properties:
                      total_zones:
                        type: integer
                        description: "Number of zones in organization"
                        example: 3
                      total_addresses_before_dedup:
                        type: integer
                        description: "Total addresses before deduplication"
                        example: 152
                      total_addresses_after_dedup:
                        type: integer
                        description: "Total unique addresses after deduplication"
                        example: 150
                      addresses_returned:
                        type: integer
                        description: "Number of addresses returned after filtering"
                        example: 150
                      showOnlyExclusions:
                        type: boolean
                        description: "Whether exclusion filter was applied"
                        example: false
                      status_breakdown:
                        type: object
                        properties:
                          Valid:
                            type: integer
                            example: 120
                          UnVerified:
                            type: integer
                            example: 25
                          Duplicate:
                            type: integer
                            example: 3
                          Opt-out:
                            type: integer
                            example: 2
                      processingTimeMs:
                        type: integer
                        description: "Processing time in milliseconds"
                        example: 150
                  addresses:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/AddressObject"
                        - type: object
                          properties:
                            zone_id:
                              type: string
                              format: uuid
                              description: "ID of the zone this address belongs to"
                              example: "c9abd41e-56a2-448e-942c-a0b37f796972"
                            zone_name:
                              type: string
                              description: "Name of the zone this address belongs to"
                              example: "Mountain View Zone"
                            campaign_id:
                              type: string
                              format: uuid
                              nullable: true
                              description: "Campaign ID associated with the zone"
                              example: "a1b2c3d4-e5f6-7g8h-9i0j-k1l2m3n4o5p6"
              examples:
                allAddresses:
                  summary: Get all addresses from organization
                  value:
                    status: "success"
                    message: "Found 150 unique addresses from 3 zones"
                    metadata:
                      total_zones: 3
                      total_addresses_before_dedup: 152
                      total_addresses_after_dedup: 150
                      addresses_returned: 150
                      showOnlyExclusions: false
                      status_breakdown:
                        Valid: 120
                        UnVerified: 25
                        Duplicate: 3
                        Opt-out: 2
                      processingTimeMs: 150
                    addresses: []
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User not in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
