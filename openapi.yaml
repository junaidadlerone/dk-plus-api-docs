  /getOnboardingStep:
    get:
      tags:
        - Version 2 APIs
      summary: Get current onboarding progress
      description: |
        Returns the completed onboarding step and the next step for the user's organization.

        **Logic:** (identical to the per-org status logic in `getAgencyOverview`)
        - Onboarding is a 4-step procedure, derived from the `organizations` + `onboarding` table fields:
          1. Business info (`business_name`)
          2. Address info (`business_address` / `street_address`)
          3. Branding (`company_logo`)
          4. Team setup — "complete" when any of `branding_settings.logo`, `team_onboarding_completed`, or `team_members_invited` is set
        - `completed_step` is the highest completed step (0–4); `next_step` is the step to complete next, or `null` when complete.
        - Note: this does **not** use `profiles.onboarding`, so it stays consistent with the `"Setup N of 4"` / `"Active"` status from `getAgencyOverview` for the same org.

        **Response Structure:**
        ```json
        {
          "completed_step": 3,
          "next_step": 4
        }
        ```
      operationId: getOnboardingStep
      security:
        - BearerAuth: []
        - SupabaseAuth: []
      parameters:
        - name: organization_id
          in: query
          required: false
          description: |
            Target a specific organization's onboarding step (e.g. a client sub-org rather than the caller's active org). The caller must have access to it (`403 FORBIDDEN` otherwise). If omitted, falls back to the caller's active organization.
          schema:
            type: string
            format: uuid
          example: c19b0772-fa37-4e47-af5e-5b48bc9f679d
      responses:
        "200":
          description: Onboarding progress retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  completed_step:
                    type: integer
                    description: The highest step number completed (0-4)
                    example: 3
                  next_step:
                    type: integer
                    nullable: true
                    description: The next step to complete (up to 4), or null if finished
                    example: 4
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No access to the requested organization, or user has no organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                forbidden:
                  summary: No access to the requested organization_id
                  value:
                    error: FORBIDDEN
                    message: You do not have access to this organization
                noOrganization:
                  summary: User not associated with any organization
                  value:
                    error: NO_ORGANIZATION
                    message: User is not associated with any organization
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

