    DeliveryFunnelAnalytics:
      type: object
      description: |
        Full PostGrid delivery status breakdown for all postcards sent by the organization.
        Every field except `total_postcards_sent` is a `FunnelBucket` with both a raw `count`
        and a `percentage` (0.0–1.0, 4 decimal places) of `total_postcards_sent`.

        **Two data sources are combined:**

        Fields derived from PostGrid's standard `status` field (all orders):
        `delivered`, `processed`, `printing`, `ready`, `cancelled`

        Fields derived from PostGrid's `imbStatus` field — Intelligent-Mail Tracking
        (US orders only, `null` until first USPS facility scan):
        `in_transit` (= `entered_mail_stream` + `out_for_delivery`), `returned`

        Statuses are refreshed on a schedule by `syncPostcardStatuses`.
        Terminal statuses (`completed`, `cancelled`) stop being polled from PostGrid.
        `returned_to_sender` (imbStatus) is also terminal once set.
      required:
        - total_postcards_sent
        - delivered
        - in_transit
        - processed
        - printing
        - ready
        - returned
        - cancelled
      properties:
        total_postcards_sent:
          type: integer
          description: |
            Raw count of all postcard records for this organization.
            This is the denominator used to calculate every percentage field below.
          example: 5000
        delivered:
          $ref: "#/components/schemas/FunnelBucket"
          description: |
            Postcards with PostGrid `status = completed`.
            PostGrid considers these "most likely delivered" (approximation — no physical confirmation).
        in_transit:
          $ref: "#/components/schemas/FunnelBucket"
          description: |
            Postcards currently confirmed inside the USPS network.
            Combines `entered_mail_stream` + `out_for_delivery` imbStatus values.
            Note: Will be 0 for non-US orders.
        processed:
          $ref: "#/components/schemas/FunnelBucket"
          description: Postcards with PostGrid `status = processed_for_delivery`.
        printing:
          $ref: "#/components/schemas/FunnelBucket"
          description: Postcards with PostGrid `status = printing`.
        ready:
          $ref: "#/components/schemas/FunnelBucket"
          description: Postcards with PostGrid `status = ready` — awaiting print on sendDate.
        returned:
          $ref: "#/components/schemas/FunnelBucket"
          description: |
            Postcards with PostGrid `imbStatus = returned_to_sender`.
            Note: Will be 0 for non-US orders.
        cancelled:
          $ref: "#/components/schemas/FunnelBucket"
          description: Postcards with PostGrid `status = cancelled` — never sent.

    WasteMeterAnalytics:
      type: object
      description: |
        Waste meter analytics — quantifies postcard spend that produced no confirmed delivery.

        **Definitions:**

        | Category | Definition | Source field |
        |---|---|---|
        | `returned` | PostGrid `imbStatus = returned_to_sender` — USPS could not deliver and returned the piece | `postcard_sends.imb_status` |
        | `cancelled` | PostGrid `status = cancelled` — order cancelled, never printed or sent | `postcard_sends.postgrid_status` |
        | `wasted` | `returned + cancelled` — total pieces that incurred cost with zero delivery | combined |
        | `delayed` | Not `completed` or `cancelled`, AND ≥ 7 **working days** (Mon–Fri) since created | `postcard_sends.created_at` |

        **Dollar amounts** are calculated at a fixed rate of **$3.00 USD per postcard**, rounded to 2 decimal places.

        **Risk status thresholds** are based on `(wasted + delayed) / total_sent × 100`:

        | Status | Problem rate |
        |---|---|
        | `Healthy` | < 5% |
        | `At Risk` | 5% – 15% |
        | `Critical` | > 15% |

        Returns `Healthy` when no postcards have been sent yet.
      required:
        - status
        - total_postcards_sent
        - total_pieces_wasted
        - total_amount_wasted
        - total_pieces_returned
        - total_amount_returned
        - total_pieces_cancelled
        - total_amount_cancelled
        - total_pieces_delayed
        - total_amount_delayed
      properties:
        status:
          type: string
          enum:
            - Healthy
            - At Risk
            - Critical
          description: |
            Overall waste risk status for this organization's postcard campaigns.
            Computed from `(total_pieces_wasted + total_pieces_delayed) / total_postcards_sent × 100`.

            - `Healthy` — problem rate < 5%
            - `At Risk` — problem rate 5%–15%
            - `Critical` — problem rate > 15%
          example: "At Risk"
        total_postcards_sent:
          type: integer
          description: |
            Total number of postcards in scope (after applying any campaign or time filters).
            Use this as the denominator when calculating percentage-at-risk on the frontend:
            `(total_pieces_wasted + total_pieces_delayed) / total_postcards_sent × 100`
          example: 1200
        total_pieces_wasted:
          type: integer
          description: |
            Total pieces that cost money but were never delivered.
            `total_pieces_returned + total_pieces_cancelled`
          example: 87
        total_amount_wasted:
          type: number
          format: float
          description: |
            Dollar cost of all wasted pieces. `total_pieces_wasted × $3.00`
          example: 261.00
        total_pieces_returned:
          type: integer
          description: |
            Pieces where PostGrid `imbStatus = returned_to_sender`.
            USPS could not deliver (undeliverable address, no forwarding) and returned the piece.
            Source: `postcard_sends.imb_status`
            Note: Only populated for US orders — PostGrid does not provide imbStatus for non-US addresses.
          example: 42
        total_amount_returned:
          type: number
          format: float
          description: |
            Dollar cost of returned pieces. `total_pieces_returned × $3.00`
          example: 126.00
        total_pieces_cancelled:
          type: integer
          description: |
            Pieces where PostGrid `status = cancelled`.
            The order was cancelled before it was ever printed or sent.
            Source: `postcard_sends.postgrid_status`
          example: 45
        total_amount_cancelled:
          type: number
          format: float
          description: |
            Dollar cost of cancelled pieces. `total_pieces_cancelled × $3.00`
          example: 135.00
        total_pieces_delayed:
          type: integer
          description: |
            Pieces that are still active (not `completed` or `cancelled`) but have not been
            delivered after **7 or more working days** (Monday–Friday) since the order was created.
            These represent spend that has not yet yielded a confirmed delivery and may never do so.
            Source: `postcard_sends.created_at` compared to today using Mon–Fri day counting.
          example: 130
        total_amount_delayed:
          type: number
          format: float
          description: |
            Dollar cost of delayed pieces. `total_pieces_delayed × $3.00`
          example: 390.00

    ScanTrendAnalytics:
      type: object
      description: |
        QR code scan trend analytics from Analytics V2.
        Aggregates scan data across all campaigns in the organization that have a PostGrid
        tracker linked via `/linkQRCodeToCampaign`.

        **Data source:** PostGrid Tracker API (`visitCount`, `uniqueVisitCount`, `/visits` endpoint)

        `scan_rate` uses the total number of postcards sent by the org (from `postcard_sends`)
        as the denominator.

        The shape of `breakdown` depends on the time filter sent in the request:

        | Request filter | `breakdown` keys |
        |---|---|
        | `last_24hours: true` | 12 fixed 2-hour slot keys: `"12am"` … `"10pm"` |
        | `last_week: true` | 7 fixed weekday keys: `"sunday_scans"` … `"saturday_scans"` |
        | `last_month: true` | Dynamic daily keys: rolling 15-day window e.g. `"Apr 6"` … `"Apr 20"` |
        | *(none / all_time)* | Dynamic monthly keys: last 6 months e.g. `"Nov 2025"` … `"Apr 2026"` |

        All keys are always present (zero-filled). Keys are returned in chronological order.
        All fields return `0` when no trackers are linked or no scans have happened yet.
      required:
        - total_scans
        - unique_scans
        - scan_rate
        - breakdown
      properties:
        total_scans:
          type: integer
          description: |
            Total QR code scans (visits) across all campaign trackers for this organization.
            Sourced from PostGrid `visitCount` — counts every scan, including repeat scans by the same person.
          example: 342
        unique_scans:
          type: integer
          description: |
            Unique QR code scanners across all campaign trackers for this organization.
            Sourced from PostGrid `uniqueVisitCount` — counts each person once regardless of how many times they scanned.
          example: 289
        scan_rate:
          type: number
          format: float
          description: |
            `(total_scans / total_postcards_sent) × 100`, rounded to 2 decimal places.
            Represents the percentage of sent postcards that resulted in at least one QR scan.
            Returns `0` when no postcards have been sent.
          example: 6.31
        breakdown:
          type: object
          description: |
            Scan counts grouped by time bucket. The keys depend on the period filter in the request.

            **`last_24hours`** — 12 fixed 2-hour slots (midnight-anchored):
            `"12am"`, `"2am"`, `"4am"`, `"6am"`, `"8am"`, `"10am"`,
            `"12pm"`, `"2pm"`, `"4pm"`, `"6pm"`, `"8pm"`, `"10pm"`

            **`last_week`** — 7 fixed weekday keys:
            `"sunday_scans"`, `"monday_scans"`, `"tuesday_scans"`, `"wednesday_scans"`,
            `"thursday_scans"`, `"friday_scans"`, `"saturday_scans"`

            **`last_month`** — dynamic daily keys for a rolling 15-day window:
            - If today ≤ 15th: keys run from the 1st of the month to today (e.g. `"Apr 1"` … `"Apr 15"`)
            - If today > 15th: keys run from 14 days ago to today (e.g. `"Apr 6"` … `"Apr 20"`)

            **`all_time`** *(default, no period flag)* — last 6 calendar months:
            e.g. `"Nov 2025"`, `"Dec 2025"`, `"Jan 2026"`, `"Feb 2026"`, `"Mar 2026"`, `"Apr 2026"`

            All keys are always present (zero-filled if no scans). Keys are in chronological order.
            For `last_month` and `all_time`, iterate via `Object.entries(breakdown)` — keys are dynamic.
          additionalProperties:
            type: integer
          example:
            "Nov 2025": 34
            "Dec 2025": 51
            "Jan 2026": 28
            "Feb 2026": 67
            "Mar 2026": 89
            "Apr 2026": 43

    RecentScansAnalytics:
      type: object
      description: |
        Recent QR code scan events from Analytics V2, grouped by campaign.
        Returns the 10 most recent scans per campaign for this organization.
        Only campaigns that have at least one scan are included.

        **Data sources:**
        - PostGrid `GET /trackers/{id}/visits` — scan events with timestamps
        - `postcard_sends` table — delivery address and sequential postcard number

        Campaigns are sorted by scan count descending (most active first).
        Returns `data: []` when no campaigns have QR trackers linked.
      required:
        - data
      properties:
        data:
          type: array
          description: One entry per campaign that has recorded at least one QR scan.
          items:
            type: object
            required:
              - campaign_id
              - campaign_name
              - scans
            properties:
              campaign_id:
                type: string
                format: uuid
                description: UUID of the campaign.
                example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              campaign_name:
                type: string
                description: Display name of the campaign.
                example: "Spring Promotion 2024"
              scans:
                type: array
                description: |
                  Up to 10 most recent scan events for this campaign, ordered by most recent first.
                items:
                  type: object
                  required:
                    - postcard_number
                    - scan_address
                    - scan_time_stamp
                  properties:
                    postcard_number:
                      type: integer
                      description: |
                        Sequential position of the scanned postcard within its campaign,
                        numbered in order of send date (1 = first postcard sent in the campaign).
                        Falls back to the scan event index if the postcard ID cannot be matched
                        in `postcard_sends`.
                      example: 42
                    scan_address:
                      type: string
                      description: |
                        Delivery address the postcard was mailed to — the household that scanned
                        the QR code. Sourced from `postcard_sends.address`.
                        Falls back to PostGrid geo data (city, region) when unavailable.
                      example: "512 Elm St, Austin, TX 78701"
                    scan_time_stamp:
                      type: string
                      description: |
                        Human-readable relative time since the scan occurred.
                        Values: `"just now"`, `"N minute(s) ago"`, `"N hour(s) ago"`,
                        `"N day(s) ago"`, `"N month(s) ago"`, or `"Unknown"` if no timestamp.
                      example: "15 minutes ago"

    CampaignLeaderboardAnalytics:
      type: object
      description: |
        Campaign leaderboard from Analytics V2 — top 5 campaigns ranked by total QR code scans.

        **Data sources:**
        - PostGrid Tracker API `visitCount` per campaign tracker
        - `campaigns.postcards_sent` for total postcards sent per campaign

        Only campaigns with a PostGrid tracker linked (via `/linkQRCodeToCampaign`) and at least
        one scan are included. Returns `leaderboard: []` when no qualifying campaigns exist.
        Maximum 5 entries. Ranked by `total_scans` descending.
      required:
        - leaderboard
      properties:
        leaderboard:
          type: array
          maxItems: 5
          description: Top campaigns ranked by total QR scan count, highest first.
          items:
            type: object
            required:
              - campaign_name
              - total_scans
              - total_postcards_sent
              - scan_rate
              - ranking_position
            properties:
              campaign_name:
                type: string
                description: Display name of the campaign.
                example: "Campaign Awesome"
              total_scans:
                type: integer
                description: |
                  Total number of QR code scans (visits) for this campaign.
                  Sourced from PostGrid `visitCount` — includes repeat scans by the same person.
                example: 55
              total_postcards_sent:
                type: integer
                description: |
                  Total postcards sent for this campaign.
                  Sourced from `campaigns.postcards_sent`, maintained by the postcard sending pipeline.
                example: 5000
              scan_rate:
                type: number
                format: float
                description: |
                  `(total_scans / total_postcards_sent) × 100`, rounded to 2 decimal places.
                  Returns `0` when no postcards have been sent.
                example: 1.10
              ranking_position:
                type: integer
                minimum: 1
                maximum: 5
                description: |
                  Rank within the leaderboard. `1` = campaign with the most scans.
                example: 1

    PerformanceDayPoint:
      type: object
      required:
        - date
        - day
        - delivery_rate
        - scan_rate
        - total_volume
      properties:
        date:
          type: string
          format: date
          description: Calendar date (YYYY-MM-DD).
          example: "2026-04-22"
        day:
          type: string
          description: Day of week name.
          example: "Tuesday"
        delivery_rate:
          type: number
          format: float
          description: Fraction of postcards created on this date that reached `completed` status (0.0–1.0).
          example: 0.8
        scan_rate:
          type: number
          format: float
          description: Scans that occurred on this date divided by total postcards sent org-wide (0.0–1.0).
          example: 0.002
        total_volume:
          type: integer
          description: Number of postcards created on this date.
          example: 50

    PerformanceWeekPoint:
      type: object
      required:
        - week
        - range
        - delivery_rate
        - scan_rate
        - total_volume
      properties:
        week:
          type: string
          description: Week label within the month.
          example: "Week 1"
        range:
          type: string
          description: Day range within the month (e.g. "1-7", "29-30").
          example: "1-7"
        delivery_rate:
          type: number
          format: float
          description: Fraction of postcards created in this week bucket that reached `completed` status (0.0–1.0).
          example: 0.82
        scan_rate:
          type: number
          format: float
          description: Scans that occurred in this week bucket divided by total postcards sent org-wide (0.0–1.0).
          example: 0.018
        total_volume:
          type: integer
          description: Number of postcards created in this week bucket.
          example: 220

    PerformanceTrendAnalytics:
      type: array
      description: |
        180 consecutive day entries covering the past 6 months (oldest → today).

        **delivery_rate** = completed postcards created that day / total postcards created that day (0.0–1.0)
        **scan_rate**     = scans that occurred that day / total postcards sent org-wide all time (0.0–1.0)
        **total_volume**  = postcards created that day

        `campaign_ids` filter scopes both postcard and tracker data. Time-based filters are ignored.
      items:
        $ref: "#/components/schemas/PerformanceDayPoint"

    CampaignPerformanceAnalytics:
      type: object
      description: |
        Top 5 best and bottom 5 worst performing campaigns ranked by total QR scans.

        All campaigns with a PostGrid tracker are ranked globally (1 = most scans, N = least).
        Unlike `campaign_leaderboard`, campaigns with 0 scans are included so that
        the true worst performers are always surfaced.

        **top_performers** — ranks 1–5 (up to 5 entries)
        **bottom_performers** — last 5 ranks, never overlapping with top_performers.
        If there are 5 or fewer campaigns total, `bottom_performers` is empty.

        `scan_rate` = `(total_scans / total_postcards_sent)` as a fraction (0.0–1.0, 4 decimal places).
      required:
        - top_performers
        - bottom_performers
      properties:
        top_performers:
          type: array
          maxItems: 5
          description: Up to 5 best-performing campaigns, ranked 1–5 by total QR scans.
          items:
            type: object
            required:
              - campaign_name
              - total_scans
              - total_postcards_sent
              - scan_rate
              - ranking_position
            properties:
              campaign_name:
                type: string
                example: "Campaign Awesome"
              total_scans:
                type: integer
                example: 55
              total_postcards_sent:
                type: integer
                example: 5000
              scan_rate:
                type: number
                format: float
                description: total_scans / total_postcards_sent (0.0–1.0).
                example: 0.011
              ranking_position:
                type: integer
                minimum: 1
                description: Global rank across all org campaigns (1 = most scans).
                example: 1
        bottom_performers:
          type: array
          maxItems: 5
          description: |
            Up to 5 worst-performing campaigns. Empty when there are 5 or fewer
            campaigns total (they are all in top_performers). Ranking positions
            continue from where top_performers ends (e.g. 6–10).
          items:
            type: object
            required:
              - campaign_name
              - total_scans
              - total_postcards_sent
              - scan_rate
              - ranking_position
            properties:
              campaign_name:
                type: string
                example: "Test Campaign"
              total_scans:
                type: integer
                example: 0
              total_postcards_sent:
                type: integer
                example: 50
              scan_rate:
                type: number
                format: float
                example: 0.0
              ranking_position:
                type: integer
                description: Global rank — higher number means fewer scans.
                example: 10

    ScanTypeBucket:
      type: object
      required:
        - count
        - percentage
      properties:
        count:
          type: integer
          description: Raw scan count for this campaign target type in the period.
          example: 6
        percentage:
          type: number
          format: float
          description: Fraction of total_scans for this type (0.0–1.0, 4 decimal places).
          example: 0.5

    ScanTypeBreakdown:
      type: object
      description: |
        QR scan count and percentage breakdown by campaign target type for a given time period.
        The three `percentage` values sum to 1.0 when total_scans > 0.
        All counts are 0 and all percentages are 0.0 when no scans occurred in the period.
      required:
        - total_scans
        - location_zone
        - referral
        - addresses_list
      properties:
        total_scans:
          type: integer
          description: Total QR scans across all campaign types in this period.
          example: 12
        location_zone:
          $ref: "#/components/schemas/ScanTypeBucket"
          description: Scans from campaigns with target type "Location Zone".
        referral:
          $ref: "#/components/schemas/ScanTypeBucket"
          description: Scans from campaigns with target type "Referral".
        addresses_list:
          $ref: "#/components/schemas/ScanTypeBucket"
          description: Scans from campaigns with target type "Addresses List".

    ScanTrendByTypeDayPoint:
      allOf:
        - $ref: "#/components/schemas/ScanTypeBreakdown"
        - type: object
          required:
            - date
            - day
          properties:
            date:
              type: string
              format: date
              example: "2026-04-22"
            day:
              type: string
              example: "Tuesday"

    ScanTrendByTypeWeekPoint:
      allOf:
        - $ref: "#/components/schemas/ScanTypeBreakdown"
        - type: object
          required:
            - week
            - range
          properties:
            week:
              type: string
              example: "Week 1"
            range:
              type: string
              example: "1-7"

    ScanTrendByTypeAnalytics:
      type: array
      description: |
        180 consecutive day entries covering the past 6 months (oldest → today), showing QR scan
        counts and rates broken down by campaign target type per day.

        `percentage` = scans_for_type / total_postcards_sent_for_that_type (0.0–1.0, 4dp).

        **Data source:** PostGrid GET /trackers/{id}/visits per campaign (up to 1000 visits per tracker).
        Campaigns are grouped by `campaigns.campaign_target_type`.

        `campaign_ids` filter scopes which campaigns are included. Time-based filters are ignored.
      items:
        $ref: "#/components/schemas/ScanTrendByTypeDayPoint"

    PostcardOverviewSummary:
      type: object
      required:
        - delivered_and_scanned
        - delivered_but_not_scanned
        - in_transit
        - returned_cancelled
      properties:
        delivered_and_scanned:
          type: integer
          description: "Count of postcards that were delivered (postgrid_status=completed) AND had their QR code scanned. Estimated as min(campaign visitCount, delivered count)."
          example: 34
        delivered_but_not_scanned:
          type: integer
          description: "Count of postcards that were delivered but QR was never scanned. Computed as delivered - delivered_and_scanned."
          example: 516
        in_transit:
          type: integer
          description: "Count of postcards still in the delivery pipeline (postgrid_status in ready, printing, processed_for_delivery)."
          example: 52
        returned_cancelled:
          type: integer
          description: "Count of postcards that were returned to sender (imb_status=returned_to_sender) or cancelled (postgrid_status=cancelled)."
          example: 95

    CampaignOverviewEntry:
      allOf:
        - $ref: "#/components/schemas/PostcardOverviewSummary"
        - type: object
          required:
            - campaign_id
            - campaign_name
            - total_postcards_sent
          properties:
            campaign_id:
              type: string
              format: uuid
              example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            campaign_name:
              type: string
              example: "Spring Promotion 2024"
            total_postcards_sent:
              type: integer
              description: "Total postcards sent for this campaign (from campaigns.postcards_sent)."
              example: 500

    PostcardOverviewAnalytics:
      type: object
      description: |
        Per-campaign breakdown of how postcards ended up, plus an aggregate total_summary.

        All four bucket fields are raw integer counts (not rates).
        delivered_and_scanned is estimated as min(campaign visitCount from PostGrid tracker, delivered count).
        Campaigns without a PostGrid tracker will show delivered_and_scanned=0.
        campaign_ids filter limits which campaigns are included.
      required:
        - total_summary
        - campaign_summary
      properties:
        total_summary:
          $ref: "#/components/schemas/PostcardOverviewSummary"
          description: Aggregated metrics across all campaigns.
        campaign_summary:
          type: array
          description: One entry per campaign.
          items:
            $ref: "#/components/schemas/CampaignOverviewEntry"

    ActiveCampaignEntry:
      type: object
      required:
        - campaign_id
        - campaign_name
        - days_running
        - in_flight
        - scans
        - delivery_rate
        - status
      properties:
        campaign_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        campaign_name:
          type: string
          example: "Spring Promotion 2024"
        days_running:
          type: integer
          description: Number of days since campaign.created_at.
          example: 14
        in_flight:
          type: integer
          description: Postcards with postgrid_status in ready, printing, processed_for_delivery.
          example: 270
        scans:
          type: integer
          description: Total QR scans from PostGrid tracker summary (visitCount).
          example: 42
        delivery_rate:
          type: number
          format: float
          description: "completed_sends / campaigns.postcards_sent (0.0–1.0, 4 decimal places). 0 when postcards_sent is 0."
          example: 0.82
        status:
          type: string
          enum:
            - "On Track"
            - "Delayed"
            - "At Risk"
            - "Pending"
          description: |
            Derived from postcard_sends records and delivery_rate:
              Pending  — no postcard_sends records exist for this campaign yet
              On Track — delivery_rate ≥ 0.80
              Delayed  — 0.60 ≤ delivery_rate < 0.80
              At Risk  — delivery_rate < 0.60
          example: "On Track"

    ActiveCampaignsAnalytics:
      type: array
      description: |
        One entry per campaign with status = "Active" in the org.
        Returns an empty array when there are no active campaigns.
        campaign_ids filter limits to active campaigns in that list.
      items:
        $ref: "#/components/schemas/ActiveCampaignEntry"

    CampaignTypeEntry:
      type: object
      required:
        - total_scans
        - total_scans_percentage
        - percent_of_subtotal
      properties:
        total_scans:
          type: integer
          description: "Raw QR scan count for this campaign target type."
          example: 21
        total_scans_percentage:
          type: number
          format: float
          description: "total_scans / postcards_sent for this type (0.0–1.0, 4 decimal places). Scan rate relative to how many postcards of this type were sent."
          example: 0.0412
        percent_of_subtotal:
          type: number
          format: float
          description: "total_scans for this type / total_scans across all types (0.0–1.0, 4 decimal places). The three types sum to 1.0 when total_scans > 0."
          example: 0.6176

    CampaignTypeDistributionAnalytics:
      type: object
      description: |
        Aggregate QR scan totals broken down by campaign target type.
        Each key is a campaign target type with its scan count, scan rate, and share of all scans.
        campaign_ids filter limits which campaigns are included.
        Time filters (last_24hours, last_week, last_month) scope the visit data from PostGrid.
      required:
        - location_zone
        - referral
        - addresses_list
      properties:
        location_zone:
          $ref: "#/components/schemas/CampaignTypeEntry"
          description: "Scans from campaigns with campaign_target_type = Location Zone."
        referral:
          $ref: "#/components/schemas/CampaignTypeEntry"
          description: "Scans from campaigns with campaign_target_type = Referral."
        addresses_list:
          $ref: "#/components/schemas/CampaignTypeEntry"
          description: "Scans from campaigns with campaign_target_type = Addresses List."

    HourEntry:
      type: object
      required:
        - hour
        - scans
      properties:
        hour:
          type: string
          description: "Clock hour label in 12-hour format (e.g. '12AM', '01AM', '12PM', '03PM')."
          example: "03PM"
        scans:
          type: integer
          description: "Number of QR scans that occurred during this hour (UTC)."
          example: 4

    ScanActivityByHourAnalytics:
      type: array
      description: |
        Today's QR scan counts broken down by clock hour (UTC).
        Always starts at 12AM and ends at the current UTC hour (inclusive).
        At 3:18 PM UTC the array contains 16 entries: 12AM through 03PM.
        Each hour bucket covers the full 60-minute window (e.g. 03PM = 15:00–15:59 UTC).
        campaign_ids filter scopes which campaign trackers are queried.
        Time filters (last_24hours, last_week, last_month) are ignored — this type always shows today.
      items:
        $ref: "#/components/schemas/HourEntry"

    DeviceEntry:
      type: object
      required:
        - device_name
        - device_scans
        - scan_percentage
      properties:
        device_name:
          type: string
          enum:
            - android
            - iphone
            - web
          description: "Device category. 'android' = PostGrid device field contains 'android', 'iphone' = contains 'iphone'/'ipad'/'ios', 'web' = everything else including 'Device Unknown'."
          example: "android"
        device_scans:
          type: integer
          description: "Raw scan count for this device category."
          example: 534
        scan_percentage:
          type: number
          format: float
          description: "device_scans / total_scans (0.0–1.0, 4 decimal places)."
          example: 0.4282

    DeviceDistributionAnalytics:
      type: object
      description: |
        QR scan counts broken down by device type, sourced from PostGrid's visit.device field.
        Always returns all three device categories (android, iphone, web) even if count is 0.
        Devices with 'Device Unknown' from PostGrid fall into the 'web' bucket.
        campaign_ids and time filters (last_24hours, last_week, last_month) are supported.
      required:
        - total_scans
        - devices
      properties:
        total_scans:
          type: integer
          description: "Total QR scans across all device types."
          example: 1247
        devices:
          type: array
          description: "Always contains exactly three entries: android, iphone, web."
          items:
            $ref: "#/components/schemas/DeviceEntry"

    CampaignEngagementEntry:
      type: object
      required:
        - campaign_id
        - campaign_name
        - time_since_last_scan
        - scans_in_24hours
        - scans_total
        - postcards_sent
        - status
      properties:
        campaign_id:
          type: string
          format: uuid
          description: "The campaign's unique identifier."
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        campaign_name:
          type: string
          description: "Human-readable campaign name."
          example: "Spring Referral Push"
        time_since_last_scan:
          type: string
          nullable: true
          description: "Human-readable time since the most recent QR scan (e.g. '3h ago', '2d ago', 'just now'). null if the campaign has never been scanned."
          example: "3h ago"
        scans_in_24hours:
          type: integer
          description: "Number of QR scans recorded in the last 24 hours."
          example: 14
        scans_total:
          type: integer
          description: "Total QR scans for this campaign (from PostGrid tracker visitCount)."
          example: 312
        postcards_sent:
          type: integer
          description: "Total number of postcards intended to be sent for this campaign (campaigns.postcards_sent)."
          example: 800
        status:
          type: string
          enum:
            - in-flight
            - completed
          description: "Campaign delivery status. 'in-flight' if any postcard_sends record for this campaign has a status of ready, printing, or processed_for_delivery; 'completed' otherwise."
          example: "in-flight"

    CampaignEngagementAnalytics:
      type: array
      description: |
        Per-campaign engagement summary. One entry per campaign belonging to the organization.
        Includes scan recency, 24-hour scan velocity, lifetime scan total, postcards sent, and delivery status.
        campaign_ids filter narrows results to the specified campaigns.
      items:
        $ref: "#/components/schemas/CampaignEngagementEntry"

    GlobalExclusionsAnalytics:
      type: object
      description: "Global exclusions analytics data"
      properties:
        total_excluded:
          type: integer
          description: "Addresses with status not equal to verified, not equal to Valid, and not equal to Opt-out"
          example: 425
        opt_outs:
          type: integer
          description: "Addresses with status equal to Opt-out"
          example: 87
        manual_entries:
          type: integer
          description: "Addresses manually added (have manual_entry flag set to true)"
          example: 156

    OverviewAnalyticsData:
      type: object
      description: "Overview analytics data for analytics page dashboard"
      properties:
        total_campaigns:
          type: integer
          description: "Total number of campaigns in organization"
          example: 15
        total_postcards_sent:
          type: integer
          description: "Total postcards sent across all campaigns"
          example: 5420
        total_qr_scans:
          type: integer
          description: "Total QR scans (sum of leads_gen from all campaigns)"
          example: 475
        total_estimated_leads_generated:
          type: integer
