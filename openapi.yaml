                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      isUnread:
                        type: boolean
                        description: True if there are any unread notifications
                      unreadCount:
                        type: integer
                        description: Number of unread notifications

  /toggleNotificationStatus:
