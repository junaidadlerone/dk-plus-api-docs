  /auditUniversalTemplates:
    get:
      tags:
        - Universal Template Audit
      summary: Audit all universal templates against PostGrid
      description: |
        Loads every universal template (`is_universal = true`) from the `templates` table,
        verifies each one against the PostGrid Print & Mail API, and returns a categorised
        status report.

        **What this endpoint does:**
        1. Fetches all universal templates from the database (including soft-deleted records
           so the audit has a complete picture).
        2. Calls `GET /templates/{id}` on PostGrid for each template **in parallel**.
        3. Assigns a status to every template — see status categories below.
        4. If any issues are detected: generates an AI summary via OpenAI and persists the
           report to `template_audit_reports`.
        5. If every template is healthy: returns the audit data with `saved: false` and
           writes nothing to the database.

        **Status categories:**

        | Status | Description |
        |---|---|
        | `active` | Not deleted in DB and exists on PostGrid — healthy |
        | `deleted_from_postgrid` | Active in DB but absent on PostGrid — **action required** |
        | `deleted_in_db_only` | Soft-deleted in DB but still present on PostGrid — potential orphan |
        | `deleted_everywhere` | Soft-deleted in DB and absent on PostGrid — fully retired |
        | `check_error` | PostGrid API call failed — needs investigation |

        **Conditional persistence:**
        - Report is only saved when `deleted_from_postgrid > 0`, `deleted_in_db_only > 0`,
          `deleted_everywhere > 0`, or `check_errors > 0`.
        - Clean runs return `saved: false` and do not write to `template_audit_reports`.

        **AI summary:**
        - Generated by OpenAI `gpt-4o-mini` when issues are found.
        - Stored in `template_audit_reports.openai_summary` and returned as `openai_summary`.
        - If OpenAI is unavailable the report is still saved; `openai_summary` will be `null`.

        **Access:** Any authenticated user may call this endpoint.
      operationId: auditUniversalTemplates
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Audit completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    description: "Human-readable summary of the audit result"
                    example: "2 template(s) deleted from PostGrid, 1 template(s) deleted in DB only"
                  saved:
                    type: boolean
                    description: "True if the report was persisted to template_audit_reports (only when issues were found)"
                    example: true
                  audit_report_id:
                    type: string
                    format: uuid
                    nullable: true
                    description: "ID of the saved audit report row; null when saved is false"
                    example: "c3d4e5f6-a7b8-9012-cdef-345678901234"
                  run_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: "Timestamp when the report was persisted; null when saved is false"
                    example: "2026-04-16T08:30:00.000Z"
                  openai_summary:
                    type: string
                    nullable: true
                    description: "AI-generated plain-English narrative of the findings; null when no issues or OpenAI unavailable"
                    example: "The audit found 2 universal templates that have been removed from PostGrid but remain active in the database. Immediate review is recommended to update or recreate these templates. Additionally, 1 template appears to have been soft-deleted in the database while still existing on PostGrid, which may indicate an incomplete deletion workflow."
                  report:
                    type: object
                    properties:
                      summary:
                        type: object
                        description: "Aggregated counts per status category"
                        properties:
                          total:
                            type: integer
                            description: "Total number of universal templates checked"
                            example: 12
                          active:
                            type: integer
                            description: "Templates that are healthy"
                            example: 9
                          deleted_from_postgrid:
                            type: integer
                            description: "Templates active in DB but missing from PostGrid"
                            example: 2
                          deleted_in_db_only:
                            type: integer
                            description: "Templates soft-deleted in DB but still on PostGrid"
                            example: 1
                          deleted_everywhere:
                            type: integer
                            description: "Templates soft-deleted in DB and absent on PostGrid"
                            example: 0
                          check_errors:
                            type: integer
                            description: "Templates whose PostGrid status could not be determined"
                            example: 0
                      templates:
                        type: array
                        description: "Full per-template audit entries"
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                              description: "Database record ID"
                            postgrid_template_id:
                              type: string
                              description: "PostGrid template identifier"
                              example: "template_tBnVEzz878mXLbHQaz86j8"
                            description:
                              type: string
                              nullable: true
                              description: "Template description from the database"
                            template_type:
                              type: string
                              enum: ["Front", "Back"]
                            postcard_size:
                              type: string
                              enum: ["4x6", "6x9", "6x11"]
                            status:
                              type: string
                              enum:
                                - active
                                - deleted_from_postgrid
                                - deleted_in_db_only
                                - deleted_everywhere
                                - check_error
                              description: "Derived status based on DB and PostGrid state"
                            db:
                              type: object
                              description: "Template state as recorded in the database"
                              properties:
                                live:
                                  type: boolean
                                  description: "Whether the template is marked live in the DB"
                                deleted:
                                  type: boolean
                                  description: "Whether the template is soft-deleted in the DB"
                                created_at:
                                  type: string
                                  format: date-time
                                updated_at:
                                  type: string
                                  format: date-time
                            postgrid:
                              type: object
                              description: "Template state as returned by PostGrid"
                              properties:
                                exists:
                                  type: boolean
                                  description: "Whether the template was found on PostGrid"
                                live:
                                  type: boolean
                                  nullable: true
                                  description: "PostGrid live flag; null if the template does not exist or the field was not returned"
                                error:
                                  type: string
                                  nullable: true
                                  description: "PostGrid error message when exists is false or the API call failed"
                  processingTimeMs:
                    type: integer
                    description: "Total time taken to run the audit in milliseconds"
                    example: 834
              examples:
                issuesFound:
                  summary: Issues found — report saved
                  value:
                    status: "success"
                    message: "2 template(s) deleted from PostGrid"
                    saved: true
                    audit_report_id: "c3d4e5f6-a7b8-9012-cdef-345678901234"
                    run_at: "2026-04-16T08:30:00.000Z"
                    openai_summary: "The audit detected 2 universal templates that have been removed from PostGrid but remain active in the database. These templates cannot be used for new postcards until they are recreated or replaced. Immediate review is recommended."
                    report:
                      summary:
                        total: 5
                        active: 3
                        deleted_from_postgrid: 2
                        deleted_in_db_only: 0
                        deleted_everywhere: 0
                        check_errors: 0
                      templates:
                        - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                          postgrid_template_id: "template_tBnVEzz878mXLbHQaz86j8"
                          description: "Summer Promo Front"
                          template_type: "Front"
                          postcard_size: "4x6"
                          status: "deleted_from_postgrid"
                          db:
                            live: true
                            deleted: false
                            created_at: "2025-06-01T10:00:00.000Z"
                            updated_at: "2025-06-01T10:00:00.000Z"
                          postgrid:
                            exists: false
                            live: null
                            error: "Template not found on PostGrid"
                    processingTimeMs: 834
                allHealthy:
                  summary: All templates healthy — not saved
                  value:
                    status: "success"
                    message: "All 5 universal template(s) are healthy — no report saved"
                    saved: false
                    audit_report_id: null
                    run_at: null
                    openai_summary: null
                    report:
                      summary:
                        total: 5
                        active: 5
                        deleted_from_postgrid: 0
                        deleted_in_db_only: 0
                        deleted_everywhere: 0
                        check_errors: 0
                      templates: []
                    processingTimeMs: 412
        "401":
          description: Unauthorized — missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "UNAUTHORIZED"
                message: "Unable to authenticate user"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "METHOD_NOT_ALLOWED"
                message: "Only GET method is allowed"
        "500":
          description: Database or unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                databaseError:
                  summary: Failed to load templates from DB
                  value:
                    error: "DATABASE_ERROR"
                    message: "Failed to fetch universal templates from the database"
                internalError:
                  summary: Unexpected runtime error
                  value:
                    error: "INTERNAL_ERROR"
                    message: "An unexpected error occurred: ..."

  /updateTemplate:
    post:
      tags:
        - Template Management
      summary: Update a template
      description: |
        Updates a template in both PostGrid and the database.

        **Business Rules:**
        - Template ID can be either database UUID or PostGrid template ID
        - Template must belong to user's organization
        - Updates PostGrid template first (html, description), then updates database
        - Cannot update deleted templates
        - Supports partial updates (provide only fields to update)
        - Can update templateType and postcardSize (database-only, not synced to PostGrid)
        - At least one field (html, description, templateType, or postcardSize) must be provided

        **Template ID Flexibility:**
        - Accepts either database UUID or PostGrid template ID
        - Automatically detects ID type and looks up template

        **Note:** PostGrid does not support changing template type or size after creation. The templateType and postcardSize parameters only update the database metadata.

        **Returns:** Updated template information
      operationId: updateTemplate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - postgridApiKey
                - templateId
              properties:
                postgridApiKey:
                  type: string
                  description: "PostGrid API key"
                  example: "live_sk_..."
                templateId:
                  type: string
                  description: "Template ID (database UUID or PostGrid template ID)"
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                html:
                  type: string
                  description: "Updated HTML content (optional)"
                  example: "<b>Hello</b> updated world!"
                description:
                  type: string
                  description: "Updated description (optional)"
                  example: "Updated Summer Campaign Front Template"
                templateType:
                  type: string
                  enum: ["Front", "Back"]
                  description: "Template type - Front or Back side of postcard (optional, database-only)"
                  example: "Front"
                postcardSize:
                  type: string
                  enum: ["4x6", "6x9", "6x11"]
                  description: "Postcard size (optional, database-only)"
                  example: "4x6"
            examples:
              updateHtmlAndDescription:
                summary: Update HTML and description
                value:
                  postgridApiKey: "live_sk_..."
                  templateId: "template_tBnVEzz878mXLbHQaz86j8"
                  html: "<b>Hello</b> updated world!"
                  description: "Updated template description"
              updateTemplateType:
                summary: Update template type and size
                value:
                  postgridApiKey: "live_sk_..."
                  templateId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  templateType: "Back"
                  postcardSize: "6x9"
              updateAll:
                summary: Update all fields
                value:
                  postgridApiKey: "live_sk_..."
                  templateId: "template_tBnVEzz878mXLbHQaz86j8"
                  html: "<b>Hello</b> updated world!"
                  description: "Updated template"
                  templateType: "Front"
                  postcardSize: "4x6"
      responses:
        "200":
          description: Template updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Template updated successfully"
                  template:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      postgrid_template_id:
                        type: string
                      description:
