                - postgridApiKey
              properties:
                templateId:
                  type: string
                  format: uuid
                  description: "Template ID to delete"
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                postgridApiKey:
                  type: string
                  description: "PostGrid API key"
                  example: "live_sk_..."
      responses:
        "200":
          description: Template deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
