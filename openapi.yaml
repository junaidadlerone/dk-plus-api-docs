                  last_week: true
              delivery_funnel:
                summary: "delivery_funnel — full status percentage breakdown"
                value:
                  type: "delivery_funnel"
              waste_meter:
                summary: "waste_meter — wasted and delayed postcard analysis"
                value:
                  type: "waste_meter"
