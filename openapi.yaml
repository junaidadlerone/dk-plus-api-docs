  /searchCampaign:
    post:
      tags:
        - Campaign Management
      summary: Search campaigns with filters
      description: |
        Search campaigns with filters. At least query or filters must be provided.

        **Query Search:**
        - Searches in: campaign_name, offer headline, offer description

        **Filters:**
        - status: Campaign status (Draft, Active, In Active)
        - start_date: Campaign start date (from offer_data)
        - end_date: Campaign expiry date (from offer_data)
        - created_by: User ID who created the campaign

        **Returns:** Campaigns with image_url (first image from referral gallery) and campaign_name
      operationId: searchCampaign
      security:
        - SupabaseAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Search query (searches in campaign_name, offer headline, and offer description)
                filters:
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                          enum: [Draft, Active, In Active]
                    start_date:
                      type: string
                      format: date
                      description: Filter by campaign start date
                    end_date:
                      type: string
                      format: date
                      description: Filter by campaign expiry date
                    created_by:
                      type: string
                      format: uuid
                      description: Filter by creator user ID
                postgrid_tracker_id:
                  type: integer
                  description: "Tracker ID from Linkly for QR code analytics"
                current_step:
                  type: integer
                  minimum: 1
                  maximum: 6
                page:
                  type: integer
                  minimum: 1
                  default: 1
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 10
            examples:
              filterByStatus:
                summary: Filter by status
                value:
                  filters:
                    status:
                      name: "Active"
                  page: 1
                  limit: 10
              filterByDates:
                summary: Filter by date range
                value:
                  filters:
                    start_date: "2025-01-01"
                    end_date: "2025-12-31"
                  page: 1
                  limit: 10
              searchQuery:
                summary: Search by query
                value:
                  query: "summer promo"
                  page: 1
                  limit: 10
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Campaign"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Invalid input (query or filters required)
        "401":
          description: Unauthorized
        "403":
          description: User not in organization
        "500":
          description: Internal server error

  /getCampaignHistory:
    post:
      tags:
