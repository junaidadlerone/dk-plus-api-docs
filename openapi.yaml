  /getAnalytics:
    post:
      tags:
        - Analytics
      summary: Get organization-level analytics with daily caching
      description: |
        Returns organization-level analytics with intelligent daily caching.

        **Features:**
        - ✅ Daily caching - First request computes, subsequent requests fetch from cache
        - ✅ Automatic refresh each day
        - ✅ Organization-scoped data
        - ✅ Multiple analytics types supported

        **Supported Analytics Types:**
        - **REFERRALS**: Total referrals, campaign-ready referrals, campaign-published referrals, and average referral value
        - **TEMPLATES**: Template usage analytics by campaign status (active, draft, inactive)
        - **CAMPAIGNS**: Active campaigns, postcards sent, total spent, total leads generated, and average scan rate
        - **DASHBOARD**: Combined dashboard view with referrals, campaigns, estimated conversion rate, and average scan rate

        **Caching Behavior:**
        - First request of the day: Computes analytics from database, saves to cache, returns `cached: false`
        - Subsequent requests (same day): Fetches from cache, returns `cached: true` (~50-100ms)
        - Next day: Cache refreshes automatically with new date

        **Authentication:** Required (JWT token)

        **Authorization:** Organization-based (ADMIN, MARKETER, TECHNICIAN)
      operationId: getAnalytics
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum: [
                    "REFERRALS",
                    "TEMPLATES",
                    "CAMPAIGNS",
                    "DASHBOARD",
                    "TARGETING_ZONES",
                    "ADDRESS_COLLECTION",
                    "GLOBAL_EXCLUSIONS",
                  ]
                  description: "Type of analytics to retrieve"
                  example: "REFERRALS"
            examples:
              referrals:
                summary: Get referrals analytics
                value:
                  type: "REFERRALS"
              templates:
                summary: Get templates analytics
                value:
                  type: "TEMPLATES"
              campaigns:
                summary: Get campaigns analytics
                value:
                  type: "CAMPAIGNS"
              dashboard:
                summary: Get dashboard analytics
                value:
                  type: "DASHBOARD"
              targeting_zones:
                summary: Get targeting zones analytics
                value:
                  type: "TARGETING_ZONES"
              address_collection:
                summary: Get address collection analytics
                value:
                  type: "ADDRESS_COLLECTION"
              global_exclusions:
                summary: Get global exclusions analytics
                value:
                  type: "GLOBAL_EXCLUSIONS"
