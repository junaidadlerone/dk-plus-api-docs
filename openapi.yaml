  /getAnalyticsV2:
    post:
      tags:
        - Analytics 2.0
      summary: Get postcard-level delivery analytics
      description: |
        Returns real-time delivery analytics based on individual PostGrid postcard records
        stored in the `postcard_sends` table. Unlike `/getAnalytics` (which uses aggregate
        campaign counters), these metrics reflect the actual delivery lifecycle of each
        postcard sourced directly from PostGrid statuses.

        **Note:** Only postcards sent after the `postcard_sends` table was introduced will
        appear in these metrics. Historical campaigns will show 0 for postcard-level metrics.

        ---

        ## How PostGrid tracking works

        PostGrid provides **two separate tracking fields** per postcard:

        ### Standard `status` field (all orders)
        Every postcard has a `status` field that progresses through this lifecycle:

        | Status | Description |
        |---|---|
        | `ready` | Order created successfully, will be printed on sendDate |
        | `printing` | Given to a printer, being processed within SLA |
        | `processed_for_delivery` | Handed off to the local postal service |
        | `completed` | Most likely delivered *(PostGrid approximation)* |
        | `cancelled` | Cancelled, will never be sent |

        ### `imbStatus` field — Intelligent-Mail Tracking (US only, nullable)
        For US orders, once a postcard is scanned at a USPS facility, PostGrid adds an
        additional `imbStatus` field with more granular tracking:

        | imbStatus | Description |
        |---|---|
        | `entered_mail_stream` | Postcard has entered a USPS facility |
        | `out_for_delivery` | Processed at final USPS facility — will deliver within a day |
        | `returned_to_sender` | Returned to sender (undeliverable) |

        We store these in `postcard_sends.postgrid_status` and `postcard_sends.imb_status`.
        `imb_status` is `null` for non-US orders or until the postcard is first scanned.

        ---

        ## Supported `type` values

        ### `dashboard_cards`
        Top-level summary cards for the main analytics dashboard.

        | Field | Source | Description |
        |---|---|---|
        | `in_flight_postcards` | `postgrid_status` | Count of postcards with status `ready`, `printing`, or `processed_for_delivery` |
        | `delivered` | `postgrid_status = completed` | Count of postcards most likely delivered (PostGrid approximation) |
        | `delivery_rate` | derived | `(delivered / total_sent) * 100` — percentage, 2 decimal places |
        | `total_scans` | PostGrid tracker API | All-time total QR scans — sum of `visitCount` across all org campaign trackers |
        | `spent_to_date` | `payment_history` | Sum of `amount_paid` for this organization across all campaigns |
        | `spent_to_date_display` | derived | Currency-formatted `spent_to_date` using the user's saved currency preference |
        | `total_postcards_delivered.total_initiated` | `campaigns.postcards_sent` | Sum of all campaigns' `postcards_sent` |
        | `total_postcards_delivered.total_delivered` | `postgrid_status = completed` | Count of delivered postcards (same as `delivered`) |
        | `total_postcards_delivered.returned` | `imb_status = returned_to_sender` | Count of returned postcards |
        | `total_postcards_delivered.cancelled` | `postgrid_status = cancelled` | Count of cancelled postcards |

        ---

        ### `delivery_funnel`
        Full breakdown of every postcard's current status, expressed as **percentages of
        `total_postcards_sent`**. Combines both `postgrid_status` and `imb_status` fields.

        | Response field | PostGrid source | PostGrid value(s) | Description |
        |---|---|---|---|
        | `total_postcards_sent` | — | — | Raw count of all postcards (percentage denominator) |
        | `delivered` | `postgrid_status` | `completed` | % most likely delivered |
        | `processed` | `postgrid_status` | `processed_for_delivery` | % handed to local postal service |
        | `printing` | `postgrid_status` | `printing` | % currently being printed |
        | `ready` | `postgrid_status` | `ready` | % awaiting print on sendDate |
        | `cancelled` | `postgrid_status` | `cancelled` | % cancelled, never sent |
        | `in_transit` | `imb_status` | `entered_mail_stream` + `out_for_delivery` | % confirmed inside USPS network (US only) |
        | `returned` | `imb_status` | `returned_to_sender` | % returned to sender (US only) |

        All percentages are rounded to 2 decimal places. Returns `0` when `total_postcards_sent` is 0.
        `in_transit` and `returned` will be `0` for non-US campaigns (no `imbStatus` from PostGrid).

        ---

        ### `waste_meter`
        Quantifies postcard spend that produced no delivery — returned, cancelled, and delayed
        postcards expressed as **piece counts and dollar costs** ($3.00 per postcard).

        Also emits an overall **`status`** risk indicator based on
        `(wasted + delayed) / total_postcards_sent`:

        | `status` value | Condition | Meaning |
        |---|---|---|
        | `Healthy` | problem rate < 5% | Delivery pipeline is performing well |
        | `At Risk` | problem rate 5–15% | Moderate waste — worth monitoring |
        | `Critical` | problem rate > 15% | High waste — requires attention |

        | Field | Source | Definition |
        |---|---|---|
        | `status` | derived | Risk indicator: `Healthy` / `At Risk` / `Critical` |
        | `total_postcards_sent` | `postcard_sends` | Total postcards in scope — use as denominator for percentage-at-risk |
        | `total_pieces_wasted` | derived | `total_pieces_returned + total_pieces_cancelled` |
        | `total_amount_wasted` | derived | `total_pieces_wasted × $3.00` |
        | `total_pieces_returned` | `imb_status = returned_to_sender` | Postcards USPS returned to sender |
        | `total_amount_returned` | derived | `total_pieces_returned × $3.00` |
        | `total_pieces_cancelled` | `postgrid_status = cancelled` | Postcards cancelled before printing |
        | `total_amount_cancelled` | derived | `total_pieces_cancelled × $3.00` |
        | `total_pieces_delayed` | derived | Not `completed`/`cancelled` AND ≥ 7 working days since sent |
        | `total_amount_delayed` | derived | `total_pieces_delayed × $3.00` |

        **Delayed definition:** A postcard is delayed if it has NOT reached `completed` or `cancelled`
        AND 7 or more working days (Monday–Friday, excluding weekends) have elapsed since `created_at`.

        Dollar amounts use a fixed price of **$3.00 USD per postcard**. Returns `0` for all
        piece/amount fields when no postcards have been sent.

        ---

        ### `scan_trend`
        Aggregates QR code scan data across all campaigns in the organization that have a
        PostGrid tracker linked via `/linkQRCodeToCampaign`.

        **Data source:** PostGrid Tracker API (`GET /print-mail/v1/trackers/{id}`)

        | Field | Description |
        |---|---|
        | `total_scans` | Sum of `visitCount` across all org campaign trackers |
        | `unique_scans` | Sum of `uniqueVisitCount` across all org campaign trackers |
        | `scan_rate` | `(total_scans / total_postcards_sent) × 100`, rounded to 2dp |
        | `breakdown` | Time-bucketed scan counts — shape varies by period filter (see below) |

        **`breakdown` shape by period:**

        | Request filter | Keys |
        |---|---|
        | `last_24hours: true` | 12 fixed 2-hour slots: `"12am"` … `"10pm"` |
        | `last_week: true` | 7 fixed weekday keys: `"sunday_scans"` … `"saturday_scans"` |
        | `last_month: true` | Dynamic daily keys — rolling 15-day window, e.g. `"Apr 6"` … `"Apr 20"` |
        | *(none — all_time)* | Dynamic monthly keys — last 6 months, e.g. `"Nov 2025"` … `"Apr 2026"` |

        All keys are always present (zero-filled). Keys are in chronological order.
        Returns all zeros when no trackers are linked or no scans have occurred yet.

        ---

        ### `recent_scans`
        Returns the **5 most recent QR code scan events per campaign**, enriched with delivery
        address and a human-readable relative timestamp. Campaigns with zero scans are excluded.

        **Data sources:**
        - PostGrid `GET /trackers/{id}/visits` → scan events (timestamp, PostGrid postcard `orderId`)
        - `postcard_sends` table → delivery address and sequential postcard number per campaign

        | Field | Source | Description |
        |---|---|---|
        | `campaign_id` | `campaigns.id` | Campaign UUID |
        | `campaign_name` | `campaigns.campaign_name` | Campaign display name |
        | `scans[].postcard_number` | `postcard_sends` row number | Sequential position of the postcard within the campaign (ordered by send date) |
        | `scans[].scan_address` | `postcard_sends.address` | Delivery address the postcard was mailed to — the household that scanned the QR code |
        | `scans[].scan_time_stamp` | `visit.createdAt` | Human-readable relative time: `"just now"`, `"5 minutes ago"`, `"2 hours ago"`, `"3 days ago"`, etc. |

        Campaigns are sorted by number of recent scans descending. Returns `data: []` when no
        trackers are linked.

        ---

        ### `campaign_leaderboard`
        Returns the **top 5 campaigns ranked by total QR scans**, giving a quick view of which
        campaigns are driving the most engagement.

        **Data sources:**
        - PostGrid `GET /trackers/{id}` → `visitCount` per campaign tracker
        - `campaigns.postcards_sent` → total postcards sent per campaign

        | Field | Description |
        |---|---|
        | `campaign_name` | Display name of the campaign |
        | `total_scans` | Total QR scan count from PostGrid `visitCount` |
        | `total_postcards_sent` | Total postcards sent for this campaign |
        | `scan_rate` | `(total_scans / total_postcards_sent) × 100`, rounded to 2dp |
        | `ranking_position` | Rank 1–5 (1 = most scans) |

        Campaigns with zero scans or no tracker linked are excluded. Returns `leaderboard: []`
        when no campaigns have trackers. Maximum 5 entries.

        ---

        ---

        ### Optional Filters (apply to all types)

        All parameters below are optional and can be combined with any `type`.

        | Parameter | Type | Description |
        |---|---|---|
        | `campaign_id` | `string (uuid)` | Scope results to one campaign. Must belong to the org. |
        | `last_24hours` | `boolean` | Restrict to the last 24 hours. |
        | `last_week` | `boolean` | Restrict to the last 7 days. |
        | `last_month` | `boolean` | Restrict to the last 30 days. |

        When no time filter is set, all historical data is returned. If multiple time flags
        are set, the most restrictive window is used: `last_24hours` > `last_week` > `last_month`.

        **DB-based types** (`dashboard_cards`, `delivery_funnel`, `waste_meter`): filters are
        applied directly to `postcard_sends` and `payment_history` Supabase queries.

        **PostGrid-based types** (`scan_trend`, `recent_scans`, `campaign_leaderboard`): `campaign_id`
        restricts which tracker is queried. Time filters use the PostGrid `/visits` endpoint
        (up to 1000 most recent events) and filter by `createdAt` in-memory.

        ---

        **Access:** All roles (ADMIN, MARKETER, TECHNICIAN)
      operationId: getAnalyticsV2
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - dashboard_cards
                    - delivery_funnel
                    - waste_meter
                    - scan_trend
                    - recent_scans
                    - campaign_leaderboard
                    - performance_trend
                    - campaign_performance
                    - scan_trend_by_type
                    - postcard_overview
                    - active_campaigns
                    - campaign_type_distribution
                    - scan_activity_by_hour
                    - device_distribution
                    - campaign_engagement
                  description: |
                    The analytics view to retrieve.
                    - `dashboard_cards` — high-level summary cards: delivery rate, total scans, scan rate, average scans/day, peak scan hour, spend
                    - `delivery_funnel` — full PostGrid status breakdown as percentages
                    - `waste_meter` — wasted/delayed postcard counts + dollar costs + risk status
                    - `scan_trend` — QR scan totals, unique scans, scan rate, day-of-week breakdown
                    - `recent_scans` — 5 most recent QR scans per campaign with address and timestamp
                    - `campaign_leaderboard` — top 5 campaigns ranked by total QR scans
                    - `performance_trend` — per-day delivery & scan rate for the past 6 months (180 entries, oldest → today)
                    - `campaign_performance` — top 5 best and bottom 5 worst performing campaigns by QR scans
                    - `scan_trend_by_type` — per-day QR scan breakdown by campaign target type for the past 6 months (180 entries, oldest → today)
                    - `postcard_overview` — per-campaign breakdown: delivered+scanned count, delivered-not-scanned count, in-transit, returned/cancelled, total_postcards_sent
                    - `active_campaigns` — live status card for every Active campaign: days running, in-flight, scans, delivery rate, status (On Track / Delayed / At Risk / Pending)
                    - `campaign_type_distribution` — aggregate QR scan totals by campaign target type (location_zone, referral, addresses_list) with scan rate and share of total
                    - `scan_activity_by_hour` — today's QR scan counts bucketed by clock hour (UTC), from 12AM up to and including the current hour
                    - `device_distribution` — total QR scans broken down by device type (android, iphone, web) using PostGrid's visit.device field
                    - `campaign_engagement` — per-campaign engagement summary: scans in last 24h, total scans, postcards sent, time since last scan, and in-flight/completed status
                campaign_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: |
                    **Optional.** Scope results to one or more campaigns. All IDs must belong to
