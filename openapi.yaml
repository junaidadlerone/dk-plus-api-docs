  /getPropertyCategories:
    get:
      tags:
        - Address Discovery
        - Discovery Sockets
      summary: List property category / subcategory taxonomy
      description: |
        Returns the two-level property taxonomy (Residential / Commercial / Land + subcategories)
        used by the address-discovery UI. Each subcategory carries `rentcast_type` — the exact
        value RentCast returns on its property rows.

        The frontend renders the response as a category-then-subcategory picker, then echoes one
        or more `subcategory_ids` to the `discoveraddresses` WebSocket when initiating a search.
        The server filters RentCast results to `property.propertyType === rentcast_type`.

        Response is static; caching at the edge is safe. JWT-gated to prevent unauthenticated
        enumeration of the taxonomy.
      operationId: getPropertyCategories
      security:
        - SupabaseAuth: []
          BearerAuth: []
      responses:
        "200":
          description: Taxonomy returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - label
                        - subcategories
                      properties:
                        id:
                          type: string
                          description: Category id (stable; safe to switch on)
                          example: residential
                        label:
                          type: string
                          description: Human-readable category label
                          example: Residential
                        subcategories:
                          type: array
                          items:
                            type: object
                            required:
                              - id
                              - label
                              - rentcast_type
                            properties:
                              id:
                                type: string
                                description: Subcategory id (echoed back to the discovery socket)
                                example: single_family
                              label:
                                type: string
                                example: Single Family Home
                              rentcast_type:
                                type: string
                                description: Exact RentCast `propertyType` enum value
                                example: Single Family
              example:
                status: success
                data:
                  - id: residential
                    label: Residential
                    subcategories:
                      - { id: single_family, label: "Single Family Home", rentcast_type: "Single Family" }
                      - { id: condo,         label: "Condo",              rentcast_type: "Condo" }
                      - { id: townhouse,     label: "Townhouse",          rentcast_type: "Townhouse" }
                      - { id: multi_family,  label: "Multi-Family",       rentcast_type: "Multi-Family" }
                      - { id: apartment,     label: "Apartment",          rentcast_type: "Apartment" }
                      - { id: manufactured,  label: "Manufactured",       rentcast_type: "Manufactured" }
                  - id: commercial
                    label: Commercial
                    subcategories:
                      - { id: industrial, label: "Industrial", rentcast_type: "Industrial" }
                      - { id: commercial, label: "Commercial", rentcast_type: "Commercial" }
                      - { id: retail,     label: "Retail",     rentcast_type: "Retail" }
                      - { id: office,     label: "Office",     rentcast_type: "Office" }
                  - id: land
                    label: Land
                    subcategories:
                      - { id: land, label: "Land / Lot", rentcast_type: "Land" }
        "401":
          description: Unauthorized — missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed (only GET is supported)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /getAddressesFromZone:
    post:
      tags:
        - Address Discovery
      summary: Get addresses from a geographic zone
      description: |
        Discovers addresses within a specified radius or count using OpenStreetMap.

        **Use Case:**
        - Find addresses for door-knocking campaigns
        - Discover residential or commercial buildings in a target area
        - Get addresses without Google Maps API dependency

        **Features:**
        - Supports two modes: radius-based or count-based search
        - Accepts address as lat,lng coordinates or full text address
        - Uses OpenStreetMap Nominatim for geocoding
        - Uses Overpass API for building discovery
        - Filters by building type (ALL, RESIDENTIAL, OTHER)
        - Returns full address details with coordinates
        - Saves zone to location_zones table and returns zone_id
        - **Campaign Linking**: When campaign_id is provided, automatically unlinks ALL existing zones from that campaign before creating the new zone (ensures only the newest search zone is linked to the campaign)

        **Building Type Classifications:**
        - **RESIDENTIAL**: apartments, barracks, bungalow, cabin, detached, annexe, dormitory, farm, ger, hotel, house, houseboat, residential, semidetached_house, static_caravan, stilt_house, terrace, tree_house, trullo
        - **OTHER**: commercial, industrial, office, retail, warehouse, religious buildings (church, mosque, temple, etc.), civic/amenity (hospital, school, museum, etc.), agricultural (barn, greenhouse, stable, etc.), sports (stadium, sports_hall, etc.), storage (shed, hangar, etc.), parking/garages, and more
        - **ALL**: Returns both residential and other building types

        **Address Geocoding:**
        - Uses reverse geocoding to get complete addresses (street, city, state, ZIP)
        - Supports optional Google Maps API key in x-google-api-key header for best results
        - Falls back to OpenStreetMap Nominatim if no Google key provided
        - Google Maps provides faster, more accurate addresses

        **Authentication:**
        - Requires JWT authentication via Authorization header (use "Authorize" button at top)
        - campaign_id is mandatory
      operationId: getAddressesFromZone
      security:
        - SupabaseAuth: []
          BearerAuth: []
      parameters:
        - name: x-google-api-key
          in: header
          required: false
          schema:
            type: string
          description: Optional Google Maps API key for better address geocoding (recommended for accurate PostGrid verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
                - data
              properties:
                address:
                  type: string
                  description: Either "lat,lng" coordinates or full text address to geocode
                  example: "1600 Amphitheatre Parkway, Mountain View, CA 94043"
                data:
                  type: object
                  description: Search parameters - must include either radius OR count
                  properties:
                    radius:
                      type: integer
                      description: Search radius in meters (use for radius mode)
                      example: 1000
                    count:
                      type: integer
                      description: Number of addresses to return (use for count mode)
                      example: 100
                    searchType:
                      type: string
                      enum: [ALL, RESIDENTIAL, OTHER]
                      default: ALL
                      description: Type of buildings to search for (filters results by residential vs other)
                campaign_id:
                  type: string
                  format: uuid
                  description: Campaign ID (optional). If not provided, the zone is marked as manual_search=true. If provided, manual_search=false
            examples:
              radiusMode:
                summary: Radius-based search with campaign
                value:
                  address: "37.4224764,-122.0842499"
                  data:
                    radius: 1000
                    searchType: "RESIDENTIAL"
                  campaign_id: "660e8400-e29b-41d4-a716-446655440001"
              countMode:
                summary: Count-based search with campaign
                value:
                  address: "1600 Amphitheatre Parkway, Mountain View, CA"
                  data:
                    count: 50
                    searchType: "ALL"
                  campaign_id: "660e8400-e29b-41d4-a716-446655440001"
              manualSearchMode:
                summary: Manual search (no campaign_id = manual_search:true)
                value:
                  address: "37.4224764,-122.0842499"
                  data:
                    radius: 1000
                    searchType: "RESIDENTIAL"
      responses:
        "200":
          description: Addresses retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Found 45 addresses"
                  zone_id:
                    type: string
                    format: uuid
                    description: Zone ID (always returned)
                    example: "123e4567-e89b-12d3-a456-426614174000"
                  center:
                    type: object
                    properties:
                      lat:
                        type: number
                      long:
                        type: number
                      radius:
                        type: integer
                        description: Only present in radius mode
                  mode:
                    type: string
                    enum: [radius, count]
                  searchType:
                    type: string
                    enum: [ALL, RESIDENTIAL, OTHER]
                  metadata:
                    type: object
                    properties:
                      totalBuildingsFound:
                        type: integer
                      addressesReturned:
                        type: integer
                      residentialCount:
                        type: integer
                      otherCount:
                        type: integer
                      processingTimeMs:
                        type: integer
                  addresses:
                    type: array
                    items:
                      type: object
                      properties:
                        lat:
                          type: number
                        long:
                          type: number
                        address:
                          type: string
                        residential:
                          type: boolean
                        building_type:
                          type: string
                        osm_id:
                          type: string
                        propertyType:
                          type: string
                          description: "Type of property (e.g., 'Single Family Home', 'Office Building', 'Warehouse')"
                          example: "Single Family Home"
                        distanceFromCenter:
                          type: integer
                          description: "Distance from search center point in meters"
                          example: 847
                        targeting_zone_name:
                          type: string
                          description: "Human-readable name of the targeting zone based on search address"
                          example: "Mountain View, CA Area"
                        campaigns_used_in:
                          type: array
                          items:
                            type: string
                          description: "List of campaign names that have used this address"
                          example: []
                        zoneType:
                          type: string
                          description: "Type of zone search performed"
                          example: "radius(1.0km)"
                        postcards_sent:
                          type: integer
                          description: "Number of postcards sent to this address"
                          example: 0
                        first_post_card_sent_date:
                          type: string
                          format: date-time
                          nullable: true
                          description: "Date when first postcard was sent to this address"
                          example: null
                        status:
                          type: string
                          enum: ["Valid", "Duplicate", "Opt-out", "UnVerified"]
                          description: "Verification status of the address"
                          example: "UnVerified"
              example:
                status: success
                message: "Found 7 addresses"
                zone_id: "123e4567-e89b-12d3-a456-426614174000"
                center:
                  lat: 37.4224764
                  long: -122.0842499
                  radius: 500
                mode: radius
                searchType: RESIDENTIAL
                metadata:
                  totalBuildingsFound: 7
                  addressesReturned: 7
                  residentialCount: 0
                  otherCount: 7
                  processingTimeMs: 1295
                addresses:
                  - lat: 37.4224816
                    long: -122.085569
                    address: "1600, Amphitheatre Parkway, Mountain View, CA, 94043"
                    residential: false
                    building_type: "commercial"
                    osm_id: "23733659"
                    propertyType: "Office Building"
                    distanceFromCenter: 847
                    targeting_zone_name: "Mountain View, CA Area"
                    campaigns_used_in: []
                    zoneType: "radius(0.5km)"
                    postcards_sent: 0
                    first_post_card_sent_date: null
                    status: "UnVerified"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /importAddressList:
    post:
      tags:
        - Address List Management
      summary: Import and verify CSV address list
      description: |
        Ingests a CSV file, parses it, identifies duplicates, and verifies unique addresses via internal field validation.

        **CSV Format Requirements:**
        The CSV must include the following headers:
        - `Address Line 1`
        - `Address Line 2` (optional)
        - `City`
        - `State`
        - `Zip Code`

        **Processing Logic:**
        1. **Parsing**: Validates headers and extracts rows.
        2. **Deduplication**: Identifies records with identical Line1, Line2, and Zip.
        3. **Validation**: Marks records as invalid if any required field is missing.
        4. **Persistence**: Saves the resulting list to the database.
      operationId: importAddressList
      security:
        - SupabaseAuth: []
          BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - list_name
                - csv_data
                - campaign_id
              properties:
                campaign_id:
                  type: string
                  format: uuid
                  description: ID of the campaign to which the address list belongs
                list_name:
                  type: string
                  description: Human-readable name for the address list
                csv_data:
                  type: string
                  format: byte
                  description: Base64 encoded CSV content. Prefixed with data:text/csv;base64 for best results.
                filename:
                  type: string
                column_mapping:
                  type: object
                  additionalProperties:
                    type: string
                  description: |
                    Optional mapping from target fields to CSV headers.
                     Fields: Address Line 1, Address Line 2, City, State, Zip Code, Country, First Name, Last Name, Full Name.
            example:
              campaign_id: "123e4567-e89b-12d3-a456-426614174000"
              list_name: "Spring Marketing Campaign"
              csv_data: "data:text/csv;base64,..."
              column_mapping:
                "Address Line 1": "street_addr"
                "Zip Code": "postal_code"
      responses:
        "200":
          description: List processed and verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  list_id:
                    type: string
                    format: uuid
                    description: ID of the created address list
                  is_editing:
                    type: boolean
                  total_addresses:
                    type: integer
                  valid_addresses:
                    type: integer
                  invalid_addresses:
                    type: integer
                  duplicate_addresses:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        address_line1:
                          type: string
                        address_line2:
                          type: string
                        city:
                          type: string
                        state:
                          type: string
                        zip:
                          type: string
                        first_name:
                          type: string
                        last_name:
                          type: string
                        full_name:
                          type: string
                        id:
                          type: string
                          format: uuid
                        country:
                          type: string
                        is_valid:
                          type: boolean
                        is_duplicate:
                          type: boolean
                        is_included:
                          type: boolean
                        status:
                          type: string
                          enum: [valid, invalid, duplicate]
                        error_message:
                          type: string
        "422":
          description: Automatic column detection failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: UNABLE_TO_AUTOMATICALLY_PICK_DATA_COLUMNS
                  message:
                    type: string
                  located_headers:
                    type: array
                    items:
                      type: string
                  missing_headers:
                    type: array
                    items:
                      type: string
                  required_headers:
                    type: array
                    items:
                      type: string
                example:
                  error: UNABLE_TO_AUTOMATICALLY_PICK_DATA_COLUMNS
                  message: "Could not find or map mandatory columns: Address Line 1, Zip Code"
                  located_headers: [
                    "street_addr",
                    "city_name",
                    "state_code",
                    "post_code",
                    "tel",
                  ]
                  missing_headers: ["Address Line 1", "Zip Code"]
                  required_headers: [
                    "Address Line 1",
                    "City",
                    "State",
                    "Zip Code",
                  ]

  /removeAllDuplicates:
    post:
      summary: Exclude all duplicate addresses from a list
      description: |
        Marks all rows having 'is_duplicate' as true as 'is_included: false'.
        Rows are not removed from the database but are excluded from campaign logic.
      tags:
        - Address Discovery
      security:
        - SupabaseAuth: []
          BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - list_id
              properties:
                list_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Duplicates removed successfully. Operation logged in history.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  removed_count:
                    type: integer
                  remaining_count:
                    type: integer

  /verifyAddresses:
    post:
      tags:
        - Address Discovery
      summary: Verify addresses in a zone using PostGrid
      description: |
        Verifies addresses in a saved zone using PostGrid address verification API.
        Updates the zone in the database with verification results.

        **Use Case:**
        - Validate addresses before sending postcards
        - Filter out undeliverable addresses
        - Get standardized address format

        **Features:**
        - Fetches zone by zone_id from location_zones table
        - Verifies all addresses in the zone using PostGrid API
        - Updates zone in database with verification status for each address
        - Returns all addresses with verified: true/false status (or only verified if showOnlyVerified=true)
        - Saves verified status to database in the zone
        - Only status='verified' is considered verified (not 'corrected')
        - Batch processing up to 10,000 addresses
        - Optional filtering to return only verified addresses in response

        **Address Parsing:**
        - Parses address formats: "Street, City, State ZIP" or "Street, City State ZIP"
        - Sends parsed components to PostGrid in format: {address: {line1, city, provinceOrState, postalOrZip, country}}
        - Returns verified address from PostGrid response

        **Authentication:** Requires JWT authentication (use "Authorize" button at top) and PostGrid API key in header
      operationId: verifyAddresses
      security:
        - SupabaseAuth: []
          BearerAuth: []
      parameters:
        - name: x-postgrid-api-key
          in: header
          required: true
          schema:
            type: string
          description: PostGrid API key for address verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - zone_id
              properties:
                zone_id:
                  type: string
                  format: uuid
                  description: ID of the zone to verify (from getAddressesFromZone response)
                showOnlyVerified:
                  type: boolean
                  default: false
                  description: If true, only return verified addresses in the response. All addresses are still saved to the zone with verification status, but the response will filter to show only verified ones.
            example:
              zone_id: "123e4567-e89b-12d3-a456-426614174000"
              showOnlyVerified: false
      responses:
        "200":
          description: Addresses verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Verified 5 of 7 addresses"
                  center:
                    type: object
                    description: Same center data from the zone
                    properties:
                      lat:
                        type: number
                      long:
                        type: number
                      radius:
                        type: integer
                  mode:
                    type: string
                    enum: [radius, count]
                    description: Same mode from the zone
                  searchType:
                    type: string
                    enum: [ALL, RESIDENTIAL, OTHER]
                    description: Same searchType from the zone
                  metadata:
                    type: object
                    properties:
                      totalBuildingsFound:
                        type: integer
                      addressesReturned:
                        type: integer
                      residentialCount:
                        type: integer
                      otherCount:
                        type: integer
                      verified_count:
                        type: integer
                        description: Number of verified addresses (total)
                      unverified_count:
                        type: integer
                        description: Number of unverified addresses (total)
                      total_addresses:
                        type: integer
                        description: Total number of addresses processed
                      returned_addresses:
                        type: integer
                        description: Number of addresses returned in response (may be filtered if showOnlyVerified=true)
                      showing_only_verified:
                        type: boolean
                        description: Indicates if response is filtered to show only verified addresses
                      processingTimeMs:
                        type: integer
                  addresses:
                    type: array
                    items:
                      type: object
                      properties:
                        lat:
                          type: number
                        long:
                          type: number
                        address:
                          type: string
                        residential:
                          type: boolean
                        building_type:
                          type: string
                        osm_id:
                          type: string
                        verified:
                          type: boolean
                          description: True only if PostGrid status is 'verified' (not 'corrected')
                        verification_details:
                          type: object
                          description: Details from PostGrid verification or error information
                          properties:
                            status:
                              type: string
                              enum: [verified, corrected, undeliverable]
                              description: PostGrid verification status
                            line1:
                              type: string
                              description: Verified street address
                            city:
                              type: string
                              description: Verified city
                            provinceOrState:
                              type: string
                              description: Verified state/province
                            postalOrZip:
                              type: string
                              description: Verified postal/zip code
                            error:
                              type: string
                              description: Error message if verification failed
                        propertyType:
                          type: string
                          description: "Type of property (e.g., 'Single Family Home', 'Office Building', 'Warehouse')"
                          example: "Single Family Home"
                        distanceFromCenter:
                          type: integer
                          description: "Distance from search center point in meters"
                          example: 847
                        targeting_zone_name:
                          type: string
                          description: "Human-readable name of the targeting zone based on search address"
                          example: "Mountain View, CA Area"
                        campaigns_used_in:
                          type: array
                          items:
                            type: string
                          description: "List of campaign names that have used this address"
                          example: []
                        zoneType:
                          type: string
                          description: "Type of zone search performed"
                          example: "radius(1.0km)"
                        postcards_sent:
                          type: integer
                          description: "Number of postcards sent to this address"
                          example: 0
                        first_post_card_sent_date:
                          type: string
                          format: date-time
                          nullable: true
                          description: "Date when first postcard was sent to this address"
                          example: null
                        status:
                          type: string
                          enum: ["Valid", "Duplicate", "Opt-out", "UnVerified"]
                          description: "Verification status of the address"
                          example: "UnVerified"
              example:
                status: success
                message: "Verified 5 of 7 addresses"
                center:
                  lat: 37.4224764
                  long: -122.0842499
                  radius: 500
                mode: radius
                searchType: RESIDENTIAL
                metadata:
                  totalBuildingsFound: 7
                  addressesReturned: 7
                  residentialCount: 7
                  otherCount: 0
                  verified_count: 5
                  unverified_count: 2
                  processingTimeMs: 5234
                addresses:
                  - lat: 37.4225
                    long: -122.0843
                    address: "1600 Amphitheatre Parkway, Mountain View, CA 94043"
                    residential: true
                    building_type: "house"
                    osm_id: "way/123456789"
                    verified: true
                    verification_details:
                      status: verified
                      line1: "1600 Amphitheatre Pkwy"
                      city: "Mountain View"
                      provinceOrState: "CA"
                      postalOrZip: "94043"
                    propertyType: "Single Family Home"
                    distanceFromCenter: 425
                    targeting_zone_name: "Mountain View, CA Area"
                    campaigns_used_in: []
                    zoneType: "radius(0.5km)"
                    postcards_sent: 0
                    first_post_card_sent_date: null
                    status: "Valid"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /launchReadyCampaign:
    post:
      tags:
        - Campaign Launch
      summary: Prepare campaign for launch using verified addresses (ADMIN/MARKETER only)
      description: |
        Prepares launch data by filtering and using addresses that have already been verified.

        **Features:**
        - ADMIN and MARKETER only
        - Campaign must have zone_id set
        - filters: Uses only addresses with verified=true
        - Skips addresses with status="Opt-out"
        - DOES NOT verify new addresses (verification must be done beforehand)
        - Calculates final cost based on verified addresses
        - Stores/updates launch data in launch_ready_campaign_data table (upserts based on campaign_id)
        - Extracts and stores merge_variable from campaign's business_data
        - Updates campaign with launch_ready_id reference
        - Organization-scoped
        - Prevents duplicates: If called multiple times for the same campaign, it updates the existing entry

        **Business Rules:**
        - Only ADMIN and MARKETER users can launch campaigns
        - Campaign must be linked to a location zone (zone_id not null)
        - Maximum 10,000 addresses per zone
        - Addresses with status="Opt-out" are excluded
        - Only addresses with verified=true are included
        - Final cost = validated_addresses × amount_per_postcard
        - Default amount_per_postcard is $3.00

        **Authentication:** Required (JWT token)

        **Authorization:** ADMIN and MARKETER only
      operationId: launchReadyCampaign
      security:
        - BearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - campaign_id
              properties:
                campaign_id:
                  type: string
                  format: uuid
                  description: Campaign ID to prepare for launch
                amount_per_postcard:
                  type: number
                  format: double
                  default: 3.00
                  description: "Cost per postcard (optional, default: 3.00)"
              example:
                campaign_id: "123e4567-e89b-12d3-a456-426614174000"
                amount_per_postcard: 3.00
      responses:
        "201":
          description: Campaign launch data prepared successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Campaign launch data prepared: 45 addresses verified"
                  validated_addresses:
                    type: integer
                    description: Number of addresses that were successfully validated
                    example: 45
                  final_cost:
                    type: number
                    format: double
                    description: Total cost (validated_addresses × amount_per_postcard)
                    example: 135.00
                  list_of_verified_addresses:
                    type: array
                    description: Array of verified address objects
                    items:
                      type: object
                      properties:
                        lat:
                          type: number
                        long:
                          type: number
                        address:
                          type: string
                        residential:
                          type: boolean
                        building_type:
                          type: string
                        verified:
                          type: boolean
                        verification_details:
                          type: object
                  launch_ready_id:
                    type: string
                    format: uuid
                    description: ID of the launch_ready_campaign_data record
                  processingTimeMs:
                    type: integer
        "400":
          description: Invalid input or campaign requirements not met
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingZone:
                  value:
                    error: "INVALID_CAMPAIGN"
                    message: "Campaign does not have a zone_id set. Please link a location zone first."
                noAddresses:
                  value:
                    error: "INVALID_INPUT"
                    message: "Zone has no addresses to verify"
        "403":
          description: Not authorized (must be ADMIN or MARKETER)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Campaign or zone not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /getCampaignLaunchData:
    post:
      tags:
        - Campaign Launch
      summary: Get campaign launch data (public access)
      description: |
        Retrieves complete launch data for a campaign including verified addresses, PostGrid templates with sizes, and campaign business/offer data. This endpoint has public access for socket connections.

        **Features:**
        - Public access (no authentication required)
        - Returns launch_ready_campaign_data for the specified campaign
        - Includes campaign PostGrid template IDs (front and back) with postcard sizes
        - Includes campaign business_data from step 4 and offer_data from step 3
        - Useful for socket connections and public integrations
        - Returns most recent launch data if multiple exist

        **Business Rules:**
        - No authentication required
        - Returns latest launch data by created_at
        - Includes all verified addresses
        - Fetches campaign template IDs and sizes from campaigns and templates tables
        - Returns campaign's business_data and offer_data fields

        **Response Data:**
        - **launch_data**: Verified addresses, costs, validation results, and merge_variable (if provided)
        - **campaign_templates**: PostGrid template IDs and sizes (e.g., "6x4", "4x6")
        - **business_data**: Campaign's business data from step 4 (includes optional merge_variable)
        - **offer_data**: Campaign's offer data from step 3

        **Authentication:** None required (public endpoint)
      operationId: getCampaignLaunchData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - campaign_id
              properties:
                campaign_id:
                  type: string
                  format: uuid
                  description: Campaign ID to get launch data for
              example:
                campaign_id: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        "200":
          description: Launch data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  launch_data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      campaign_id:
                        type: string
                        format: uuid
                      zone_id:
                        type: string
                        format: uuid
                        nullable: true
                      campaign_target_type:
                        type: string
                        enum: [Referrals, Location Zones, Address Lists]
                      csv_address_list_id:
                        type: string
                        format: uuid
                        nullable: true
                      validated_addresses:
                        type: integer
                        description: Number of addresses that were successfully validated
                        example: 45
                      final_cost:
                        type: number
                        format: double
                        description: Total cost
                        example: 135.00
                      amount_per_postcard:
                        type: number
                        format: double
                        example: 3.00
                      verified_addresses:
                        type: array
                        description: Array of verified address objects
                        items:
                          type: object
                      merge_variable:
                        type: object
                        nullable: true
                        description: Custom merge variables for mail merge operations
                        additionalProperties: true
                        example:
                          customer_name: "John Doe"
                          special_offer: "20% off"
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      created_at_tz:
                        $ref: "#/components/schemas/TimezoneEnrichment"
                      updated_at_tz:
                        $ref: "#/components/schemas/TimezoneEnrichment"
                      cost_display:
                        type: object
                        properties:
                          final_cost:
                            $ref: "#/components/schemas/CurrencyEnrichment"
                          per_postcard:
                            $ref: "#/components/schemas/CurrencyEnrichment"
                          currency_code:
                            type: string
                            example: "USD"
                  campaign_templates:
                    type: object
                    description: PostGrid template IDs and sizes for the campaign
                    properties:
                      front_template_id:
                        type: string
                        description: PostGrid front template ID
                        example: "template_abc123"
                      front_template_size:
                        type: string
                        nullable: true
                        description: Front template postcard size (e.g., "6x4", "4x6")
                        example: "6x4"
                      back_template_id:
                        type: string
                        description: PostGrid back template ID
                        example: "template_def456"
                      back_template_size:
                        type: string
                        nullable: true
                        description: Back template postcard size (e.g., "6x4", "4x6")
                        example: "6x4"
                  business_data:
                    type: object
                    description: Campaign business data from step 6
                    nullable: true
                  offer_data:
                    type: object
                    description: Campaign offer data from step 5
                    nullable: true
                  processingTimeMs:
                    type: integer
        "404":
          description: No launch data found for this campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updatePostCardsSentCount:
    post:
      tags:
        - Campaign Management
      summary: Update postcards sent count (Public)
      description: |
        Updates the postcards_sent count for a specific campaign.

        **Business Rules:**
        - Public access (no JWT auth required)
        - Updates only the postcards_sent count
        - Does NOT change campaign or referral status (use /changeCampaignStatus for that)
        - Designed for webhook integrations (e.g., PostGrid)

        This endpoint is public and does not require authentication.
      operationId: updatePostCardsSentCount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - campaign_id
                - count
              properties:
                campaign_id:
                  type: string
                  format: uuid
                  description: Campaign ID to update
                count:
                  type: integer
                  minimum: 0
                  description: New postcard count
      responses:
        "200":
          description: Count updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Postcard count updated successfully
                  campaign_id:
                    type: string
                    format: uuid
                  count:
                    type: integer
        "400":
          description: Invalid input
        "404":
          description: Campaign not found
        "500":
          description: Internal server error

  /changeCampaignStatus:
    post:
      tags:
        - Campaign Management
      summary: Change campaign status to Active (Public)
      description: |
        Changes campaign status to Active and associated referral status to "In Use".

        **Business Rules:**
        - Public access (no JWT auth required)
        - Changes campaign status to "Active"
        - If campaign has a linked referral, changes referral status to "In Use"
        - Designed for webhook integrations (e.g., PostGrid)
        - Does NOT update postcards_sent count (use /updatePostCardsSentCount for that)

        This endpoint is public and does not require authentication.
      operationId: changeCampaignStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - campaign_id
              properties:
                campaign_id:
                  type: string
                  format: uuid
                  description: Campaign ID to change status for
            example:
              campaign_id: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        "200":
          description: Status changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Campaign status changed to Active successfully
                  campaign_id:
                    type: string
                    format: uuid
                    example: "123e4567-e89b-12d3-a456-426614174000"
        "400":
          description: Invalid input
          content:
            application/json:
