  /addPaymentMethod:
    post:
      tags:
        - Billing
      summary: Add payment method to organization (ADMIN only)
      description: |
        Attaches a payment method to the organization's Stripe customer and optionally sets it as default.

        **Features:**
        - ✅ ADMIN only
        - ✅ Creates Stripe customer if first time
        - ✅ Automatically sets as default if it's the only payment method
        - ✅ Organization-scoped
        - ✅ Requires payment_method_id from Stripe.js frontend
        - ✅ Creates notification for ADMIN users

        **Business Rules:**
        - Only ADMIN users can manage payment methods
        - Creates Stripe customer on first payment method addition
        - First payment method is automatically set as default
        - Subsequent payment methods require explicit default setting
        - Generates notification: "Payment Method {last4} added to your organization"

        **Frontend Integration:**
        1. Use Stripe.js to collect card details
        2. Create payment method token: `stripe.createPaymentMethod()`
        3. Send `payment_method_id` to this endpoint

        **Authentication:** Required (JWT token)

        **Authorization:** ADMIN only
      operationId: addPaymentMethod
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_method_id
              properties:
                payment_method_id:
                  type: string
                  description: "Payment method ID from Stripe.js (pm_xxxxx)"
                  example: "pm_1234567890abcdefghijklmn"
                isTestMode:
                  type: boolean
                  description: "If true, use Stripe test keys; if false or not provided, use production keys"
                  example: true
                  default: false
      responses:
        "201":
          description: Payment method added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Payment method added and set as default"
                  payment_method:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "pm_1234567890abcdefghijklmn"
                      type:
                        type: string
                        example: "card"
                      card:
                        type: object
                        properties:
                          brand:
                            type: string
                            example: "visa"
                          last4:
                            type: string
                            example: "4242"
                          exp_month:
                            type: integer
                            example: 12
                          exp_year:
                            type: integer
                            example: 2025
                      is_default:
                        type: boolean
                        example: true
                  processingTimeMs:
                    type: integer
                    example: 245
        "400":
          description: Invalid input or card error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidInput:
                  value:
                    error: "INVALID_INPUT"
                    message: "payment_method_id is required and must be a string"
                cardError:
                  value:
                    error: "CARD_ERROR"
                    message: "Your card was declined"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - not ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                notAdmin:
                  value:
                    error: "FORBIDDEN"
                    message: "Only ADMIN users can manage payment methods"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

