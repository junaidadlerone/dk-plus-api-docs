        "500":
          description: Internal Server Error

  /removeAllDuplicateAddresses:
    post:
      tags:
        - Address List Management
      summary: Exclude all duplicate addresses from list
      description: |
        Marks rows as `is_deleted: true` and `is_included: false` if they are tagged as `is_duplicate` within a CSV address list.
        Updates list metadata and adds an entry to the operation history.
      operationId: removeAllDuplicateAddresses
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - list_id
              properties:
                list_id:
                  type: string
                  format: uuid
                  description: UUID of the CSV address list
      responses:
        "200":
          description: Successfully excluded duplicates
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  excluded_count:
                    type: integer
                  total_count:
                    type: integer
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error

  /editAddress:
    post:
      tags:
        - Address List Management
      summary: Update a specific address in a CSV list
      description: |
        Updates a specific row within a CSV address list and re-validates the address fields.
      operationId: editAddress
      security:
        - BearerAuth: []
      requestBody:
