            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /deleteSignatureById:
    delete:
      tags:
        - Referral Management
      summary: Delete signature by ID
      description: |
        Deletes a specific signature record and its associated proof file from storage.

        **Business Rules:**
        - Requires signature ID in request body
        - Deletes signature record from database
        - Deletes associated proof file from Supabase Storage (if it exists)
        - Organization-based authentication
        - Operation is idempotent (returns success even if proof file doesn't exist)

        **Returns:** Success confirmation with deleted signature ID
      operationId: deleteSignatureById
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                  description: Signature ID to delete
                  example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
      responses:
        "200":
          description: Signature deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Signature deleted successfully"
                  data:
                    type: object
                    properties:
                      id:
