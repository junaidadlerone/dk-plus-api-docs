                  example: true
                last_week:
                  type: boolean
                  description: |
                    **Optional.** When `true`, restrict results to the last 7 days.
                  example: true
                last_month:
                  type: boolean
                  description: |
                    **Optional.** When `true`, restrict results to the last 30 days.
                  example: true
            examples:
              dashboard_cards:
                summary: "dashboard_cards — all campaigns, all time"
                value:
                  type: "dashboard_cards"
              dashboard_cards_filtered:
                summary: "dashboard_cards — multiple campaigns, last week"
