                $ref: "#/components/schemas/Error"

  /getAllCurrencies:
    get:
      tags:
        - System Preferences
      summary: Get all available currencies
      description: |
        Returns a list of all available currencies for user selection.

        **Access:**
        - Public (no authentication required)

        **Response:**
