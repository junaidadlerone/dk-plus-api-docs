  /createNewTemplate:
    post:
      tags:
        - Template Management
      summary: Create a new PostGrid template
      description: |
        Creates a template in PostGrid and saves it to the database.

        **Business Rules:**
        - Creates template using PostGrid API
        - Saves template metadata to database
        - Template is organization-scoped
        - Tracks creator via createdBy field
        - Initializes empty campaigns_used array (or with campaign_id if provided)
        - Supports manual edit flag for campaign-specific templates
        - If isManualEdit is true, campaign_id is required and will be added to campaigns_used array

        **Required Fields:**
        - postgridApiKey: PostGrid API key for authentication
        - description: Template description
        - html: HTML content for the template
        - templateType: Front or Back
        - postcardSize: 4x6, 6x9, or 6x11

        **Optional Fields:**
        - isManualEdit: Boolean flag (default: false). If true, template is only shown when querying with specific campaign_id
        - campaign_id: String (required if isManualEdit is true). Campaign ID to add to campaigns_used array
      operationId: createNewTemplate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - postgridApiKey
                - description
                - html
                - templateType
                - postcardSize
              properties:
                postgridApiKey:
                  type: string
                  description: "PostGrid API key"
                  example: "live_sk_..."
                description:
                  type: string
                  description: "Template description"
                  example: "Summer Campaign Front Template"
                html:
                  type: string
                  description: "HTML content for the template"
                  example: "<b>Hello</b> {{to.firstName}}!"
                templateType:
                  type: string
                  enum: ["Front", "Back"]
                  description: "Template type: Front or Back of postcard"
                  example: "Front"
                postcardSize:
                  type: string
                  enum: ["4x6", "6x9", "6x11"]
                  description: "Postcard size"
                  example: "4x6"
                isManualEdit:
                  type: boolean
                  description: "Optional flag (default: false). If true, template is only shown when querying with specific campaign_id. When true, campaign_id is required"
                  example: false
                campaign_id:
                  type: string
                  format: uuid
                  description: "Optional campaign ID. Required if isManualEdit is true. Will be added to campaigns_used array"
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "201":
          description: Template created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Template created successfully"
                  template:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      postgrid_template_id:
                        type: string
                        example: "template_tBnVEzz878mXLbHQaz86j8"
                      description:
                        type: string
                        example: "Summer Campaign Front Template"
                      html:
                        type: string
                        example: "<b>Hello</b> {{to.firstName}}!"
                      templateType:
                        type: string
                        enum: ["Front", "Back"]
                        example: "Front"
                      postcardSize:
                        type: string
                        enum: ["4x6", "6x9", "6x11"]
                        example: "4x6"
                      campaigns_used:
                        type: array
                        items:
                          type: string
                        description: "Array of campaign IDs where this template is used. Contains campaign_id if isManualEdit was true during creation"
                        example: []
                      createdBy:
                        $ref: "#/components/schemas/CreatedByInfo"
                      live:
                        type: boolean
                        example: false
                      deleted:
                        type: boolean
                        example: false
                      is_manual_edit:
                        type: boolean
                        description: "True if template was manually created/edited for a specific campaign"
                        example: false
                      created_at:
                        type: string
                        format: date-time
                        example: "2025-02-02T10:00:00.000Z"
                      updated_at:
                        type: string
                        format: date-time
                        example: "2025-02-02T10:00:00.000Z"
                  processingTimeMs:
                    type: integer
                    example: 1523
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User not in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: PostGrid API or database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

