                  message:
                    type: string
        "400":
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /getMergeVariables:
