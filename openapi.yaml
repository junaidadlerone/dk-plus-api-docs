                  message:
                    type: string
                    example: Template bundle created successfully
                  bundle:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      front_template:
                        type: object
                        description: Front template details
                      back_template:
                        type: object
                        description: Back template details
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                  processingTimeMs:
                    type: number
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

