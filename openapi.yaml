    CampaignV2Step1:
      type: object
      required:
        - step
        - campaign_name
      properties:
        step:
          type: integer
          enum: [1]
          description: Must be 1 for Step 1
        campaign_name:
          type: string
          description: Name for the campaign
        referral_id:
          type: string
          format: uuid
          description: Optional UUID of referral to link
        disclaimer_text:
          type: string
          description: Optional disclaimer text
        start_date:
          type: string
          format: date-time
          description: Optional start date for the campaign
        target_type:
          type: string
          enum: [Referrals, Location Zones, Address Lists]
          description: Chosen targeting method for the campaign. Inferred if omitted (defaults to Location Zone, or Referrals if referral_id provided).

    CampaignV2Step2:
      type: object
      required:
        - step
        - campaign_id
        - template_bundle_id
      properties:
        step:
          type: integer
          enum: [2]
          description: Must be 2 for Step 2
        campaign_id:
          type: string
          format: uuid
          description: UUID of campaign from Step 1
        template_bundle_id:
          type: string
          format: uuid
          description: UUID of template bundle

    CampaignV2Step3:
      type: object
      required:
        - step
        - campaign_id
      properties:
        step:
          type: integer
          enum: [3]
          description: Must be 3 for Step 3
        campaign_id:
          type: string
          format: uuid
          description: UUID of campaign
        zone_id:
          type: string
          format: uuid
          description: UUID of location zone (required for Location Zone campaigns)
        csv_address_list_id:
          type: string
          format: uuid
          description: UUID of uploaded address list (required for Address List campaigns)

    CampaignV2Step4:
      type: object
      required:
        - step
        - campaign_id
        - consent
      properties:
        step:
          type: integer
          enum: [4]
          description: Must be 4 for Step 4
        campaign_id:
          type: string
          format: uuid
          description: UUID of campaign
        consent:
          type: object
          description: Object mapping disclaimer IDs to boolean (all must be true)
          additionalProperties:
            type: boolean

